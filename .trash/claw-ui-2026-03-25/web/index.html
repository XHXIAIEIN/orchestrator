<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claw</title>
<style>
  :root {
    --bg: #18181c;
    --bg-card: #1e1e24;
    --bg-input: #26262e;
    --border: #333340;
    --text: #e0e0e6;
    --text-dim: #888894;
    --accent: #6c8aff;
    --accent-dim: #4a5f99;
    --success: #4ade80;
    --warn: #fbbf24;
    --error: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ===== WIDGET MODE ===== */
  #widget {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 12px 14px;
    -webkit-app-region: drag;
    cursor: grab;
  }
  #widget.hidden { display: none; }

  .w-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .w-header .left {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .w-logo {
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.5px;
  }
  .w-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--error);
    transition: background 0.5s;
  }
  .w-dot.online { background: var(--success); }
  .w-uptime {
    font-size: 11px;
    color: var(--text-dim);
  }
  .w-expand {
    -webkit-app-region: no-drag;
    background: none; border: none;
    color: var(--text-dim); cursor: pointer;
    padding: 2px 6px; border-radius: 4px;
    font-size: 13px; transition: all 0.15s;
  }
  .w-expand:hover { background: var(--bg-input); color: var(--text); }

  .w-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    flex: 1;
  }
  .w-stat {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    -webkit-app-region: no-drag;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .w-stat:hover { border-color: var(--accent); }
  .w-stat .label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .w-stat .value {
    font-size: 18px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .w-stat .value.ok { color: var(--success); }
  .w-stat .value.warn { color: var(--warn); }
  .w-stat .value.err { color: var(--error); }

  .w-bar {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .w-bar .ticker {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ===== EXPANDED MODE ===== */
  #expanded {
    display: none;
    flex-direction: column;
    height: 100vh;
  }
  #expanded.visible { display: flex; }

  .e-titlebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 6px;
    -webkit-app-region: drag;
    flex-shrink: 0;
  }
  .e-titlebar .left {
    display: flex; align-items: center; gap: 7px;
  }
  .e-titlebar .name { font-weight: 600; font-size: 14px; }
  .e-titlebar .actions {
    display: flex; gap: 4px;
    -webkit-app-region: no-drag;
  }
  .e-titlebar .actions button {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; padding: 4px 8px; border-radius: 4px;
    font-size: 14px; transition: all 0.15s;
  }
  .e-titlebar .actions button:hover { background: var(--bg-input); color: var(--text); }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 8px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    -webkit-app-region: no-drag;
    user-select: text;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 88%;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 13.5px;
    line-height: 1.55;
    word-break: break-word;
    animation: fadeIn 0.2s ease;
  }
  .msg.user { align-self: flex-end; background: var(--accent-dim); border-bottom-right-radius: 3px; }
  .msg.assistant { align-self: flex-start; background: var(--bg-card); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
  .msg.system { align-self: center; color: var(--text-dim); font-size: 12px; padding: 4px 8px; }
  .msg pre { background: var(--bg); padding: 6px 8px; border-radius: 6px; overflow-x: auto; font-size: 12px; margin: 4px 0; font-family: 'Cascadia Code','Consolas',monospace; }
  .msg code { font-family: 'Cascadia Code','Consolas',monospace; font-size: 12.5px; background: var(--bg); padding: 1px 4px; border-radius: 3px; }

  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  .input-area {
    padding: 10px 14px 14px;
    -webkit-app-region: no-drag;
    flex-shrink: 0;
  }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  #input {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 40px;
    max-height: 120px;
    transition: border-color 0.2s;
  }
  #input:focus { border-color: var(--accent); }
  #input::placeholder { color: var(--text-dim); }

  #send {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    color: white;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  #send:hover { filter: brightness(1.15); }
  #send:disabled { opacity: 0.4; cursor: default; }

  .shortcuts {
    display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap;
  }
  .shortcuts button {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    color: var(--text-dim);
    font-size: 11.5px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .shortcuts button:hover { border-color: var(--accent); color: var(--text); }

  .loading { display: inline-flex; gap: 4px; padding: 8px 12px; }
  .loading span { width:6px; height:6px; border-radius:50%; background:var(--text-dim); animation: pulse 1.2s infinite; }
  .loading span:nth-child(2) { animation-delay:0.2s; }
  .loading span:nth-child(3) { animation-delay:0.4s; }
  @keyframes pulse { 0%,100%{opacity:0.3;} 50%{opacity:1;} }
</style>
</head>
<body>

<!-- ===== WIDGET MODE ===== -->
<div id="widget">
  <div class="w-header">
    <div class="left">
      <div class="w-dot" id="wDot"></div>
      <span class="w-logo">Claw</span>
      <span class="w-uptime" id="wUptime"></span>
    </div>
    <button class="w-expand" onclick="doExpand()" title="Expand (Alt+O)">&#x2921;</button>
  </div>
  <div class="w-stats">
    <div class="w-stat" onclick="doExpand(); quickCmd('/status')">
      <div class="label">Events</div>
      <div class="value" id="wEvents">--</div>
    </div>
    <div class="w-stat" onclick="doExpand(); quickCmd('/tasks')">
      <div class="label">Tasks</div>
      <div class="value" id="wTasks">--</div>
    </div>
    <div class="w-stat" onclick="doExpand(); quickCmd('/stats')">
      <div class="label">DB</div>
      <div class="value" id="wDb">--</div>
    </div>
  </div>
  <div class="w-bar">
    <span class="ticker" id="wTicker">Loading...</span>
  </div>
</div>

<!-- ===== EXPANDED MODE ===== -->
<div id="expanded">
  <div class="e-titlebar">
    <div class="left">
      <div class="w-dot online" id="eDot"></div>
      <span class="name">Claw</span>
    </div>
    <div class="actions">
      <button onclick="openDashboard()" title="Dashboard">&#x2197;</button>
      <button onclick="doCollapse()" title="Collapse">&#x2913;</button>
      <button onclick="doClose()" title="Hide">&#x2715;</button>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Ask Orchestrator..." autofocus></textarea>
      <button id="send" onclick="send()">&#x27A4;</button>
    </div>
    <div class="shortcuts">
      <button onclick="quickCmd('/status')">Status</button>
      <button onclick="quickCmd('/brief')">Brief</button>
      <button onclick="quickCmd('/tasks')">Tasks</button>
      <button onclick="quickCmd('/logs')">Logs</button>
      <button onclick="quickCmd('/departments')">Depts</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:23714';
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');

let currentMode = 'widget';
let pollTimer = null;

// ===== Mode switching (called from C#) =====
function switchMode(mode) {
  currentMode = mode;
  document.getElementById('widget').className = mode === 'widget' ? '' : 'hidden';
  document.getElementById('expanded').className = mode === 'expanded' ? 'visible' : '';
  if (mode === 'widget') startPolling();
}

function doExpand() { window.chrome?.webview?.postMessage('expand'); }
function doCollapse() { window.chrome?.webview?.postMessage('collapse'); }
function doClose() { window.chrome?.webview?.postMessage('close'); }
function openDashboard() { window.chrome?.webview?.postMessage('dashboard'); }

// ===== Widget polling =====
function startPolling() {
  pollOnce();
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pollOnce, 8000);
}

async function pollOnce() {
  const wDot = document.getElementById('wDot');
  const wEvents = document.getElementById('wEvents');
  const wTasks = document.getElementById('wTasks');
  const wDb = document.getElementById('wDb');
  const wUptime = document.getElementById('wUptime');
  const wTicker = document.getElementById('wTicker');

  try {
    const [health, stats, tasks] = await Promise.all([
      fetch(`${API}/api/health`, { signal: AbortSignal.timeout(3000) }).then(r => r.json()),
      fetch(`${API}/api/stats`, { signal: AbortSignal.timeout(3000) }).then(r => r.json()).catch(() => null),
      fetch(`${API}/api/tasks?limit=1`, { signal: AbortSignal.timeout(3000) }).then(r => r.json()).catch(() => null),
    ]);

    wDot.classList.add('online');
    document.getElementById('eDot')?.classList.add('online');

    // Uptime
    if (health.uptime) {
      const h = Math.floor(health.uptime / 3600);
      const m = Math.floor((health.uptime % 3600) / 60);
      wUptime.textContent = h > 0 ? `${h}h ${m}m` : `${m}m`;
    }

    // Events
    wEvents.textContent = health.event_count ?? '--';
    wEvents.className = 'value ok';

    // DB size
    if (health.db_size) {
      wDb.textContent = health.db_size;
      wDb.className = 'value';
    }

    // Tasks
    if (tasks && Array.isArray(tasks)) {
      const pending = tasks.filter(t => t.status === 'pending').length;
      wTasks.textContent = pending > 0 ? pending : '0';
      wTasks.className = pending > 0 ? 'value warn' : 'value ok';
    }

    // Ticker: last event or summary
    if (stats && stats.total_events !== undefined) {
      const cats = stats.categories || {};
      const parts = Object.entries(cats).slice(0, 3).map(([k,v]) => `${k}: ${v}`);
      wTicker.textContent = parts.join(' · ') || `${stats.total_events} events`;
    } else {
      wTicker.textContent = 'Online';
    }

  } catch {
    wDot.classList.remove('online');
    document.getElementById('eDot')?.classList.remove('online');
    wEvents.textContent = '--';
    wEvents.className = 'value err';
    wTasks.textContent = '--';
    wDb.textContent = '--';
    wUptime.textContent = '';
    wTicker.textContent = 'Offline — docker compose up -d';
  }
}

// ===== Chat =====
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

function addMessage(text, role = 'assistant') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = role === 'assistant' ? formatMd(text) : escapeHtml(text);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function addLoading() {
  const d = document.createElement('div');
  d.className = 'msg assistant'; d.id = 'loading';
  d.innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';
  messagesEl.appendChild(d);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function removeLoading() { document.getElementById('loading')?.remove(); }

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatMd(text) {
  return text
    .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

async function send() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  addMessage(text, 'user');

  if (text.startsWith('/')) await handleCommand(text);
  else await handleChat(text);

  sendBtn.disabled = false;
  inputEl.focus();
}

async function handleCommand(cmd) {
  addLoading();
  try {
    const route = cmd.split(' ')[0].substring(1);
    const urls = {
      status: '/api/health', brief: '/api/brief', tasks: '/api/tasks',
      logs: '/api/logs?limit=10', stats: '/api/stats', departments: '/api/departments'
    };
    const url = urls[route];
    if (!url) { removeLoading(); addMessage(`Unknown: ${cmd}`, 'system'); return; }
    const data = await fetch(API + url).then(r => r.json());
    removeLoading();
    addMessage('```json\n' + JSON.stringify(data, null, 2) + '\n```');
  } catch (err) {
    removeLoading();
    addMessage(`Error: ${err.message}`, 'system');
  }
}

async function handleChat(text) {
  addLoading();
  try {
    const data = await fetch(`${API}/api/tasks`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: text, source: 'claw', priority: 'MEDIUM' })
    }).then(r => r.json());
    removeLoading();
    if (data.id) addMessage(`Task #${data.id} created\n\n_${text}_`);
    else addMessage('```json\n' + JSON.stringify(data, null, 2) + '\n```');
  } catch (err) {
    removeLoading();
    addMessage(`Cannot reach Orchestrator\n\nTry: \`docker compose up -d\``, 'system');
  }
}

function quickCmd(cmd) {
  inputEl.value = cmd;
  send();
}

// Boot
startPolling();
</script>
</body>
</html>
