<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Claw Spotlight</title>
<style>
  :root {
    --bg: #1a1a20;
    --bg-card: #22222a;
    --border: #333340;
    --text: #e0e0e6;
    --text-dim: #78788a;
    --accent: #6c8aff;
    --success: #4ade80;
    --error: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  .spotlight {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* Search bar */
  .bar {
    display: flex;
    align-items: center;
    padding: 14px 18px;
    gap: 12px;
    border-bottom: 1px solid transparent;
    -webkit-app-region: drag;
    transition: border-color 0.2s;
  }
  .bar.has-results { border-bottom-color: var(--border); }

  .bar .icon {
    color: var(--accent);
    font-size: 20px;
    flex-shrink: 0;
    line-height: 1;
  }
  .bar .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--error);
    flex-shrink: 0;
    transition: background 0.4s;
  }
  .bar .dot.online { background: var(--success); }

  #searchInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 18px;
    font-family: inherit;
    font-weight: 300;
    letter-spacing: 0.2px;
    -webkit-app-region: no-drag;
  }
  #searchInput::placeholder { color: var(--text-dim); }

  .bar .hint {
    color: var(--text-dim);
    font-size: 11px;
    flex-shrink: 0;
    -webkit-app-region: no-drag;
  }
  .bar .hint kbd {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 10px;
    font-family: inherit;
  }

  /* Results */
  .results {
    flex: 1;
    overflow-y: auto;
    padding: 6px 8px;
  }
  .results::-webkit-scrollbar { width: 4px; }
  .results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .result-item {
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: background 0.1s;
    animation: slideIn 0.15s ease;
  }
  .result-item:hover, .result-item.selected { background: var(--bg-card); }
  .result-item .r-icon { color: var(--text-dim); font-size: 14px; margin-top: 2px; flex-shrink: 0; }
  .result-item .r-body { flex: 1; min-width: 0; }
  .result-item .r-title { font-size: 13.5px; font-weight: 500; }
  .result-item .r-desc {
    font-size: 12px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 2px;
  }
  .result-item .r-badge {
    font-size: 10px; color: var(--accent);
    background: rgba(108,138,255,0.12);
    padding: 2px 6px; border-radius: 4px;
    flex-shrink: 0; align-self: center;
  }

  @keyframes slideIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

  /* Response block (for command output) */
  .response {
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.6;
    overflow-y: auto;
  }
  .response pre {
    background: #15151a;
    padding: 10px 12px;
    border-radius: 8px;
    font-family: 'Cascadia Code','Consolas',monospace;
    font-size: 12px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .response .error { color: var(--error); }
  .response .ok { color: var(--success); }

  .loading-bar {
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: loadSlide 1s infinite;
  }
  @keyframes loadSlide { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
</style>
</head>
<body>

<div class="spotlight">
  <div class="bar" id="bar">
    <span class="dot" id="dot"></span>
    <input id="searchInput" type="text" placeholder="Type a command..." autocomplete="off" autofocus spellcheck="false">
    <span class="hint"><kbd>Esc</kbd> close &nbsp;<kbd>Tab</kbd> select</span>
  </div>
  <div class="results" id="results"></div>
</div>

<script>
const API = 'http://localhost:23714';
const input = document.getElementById('searchInput');
const results = document.getElementById('results');
const bar = document.getElementById('bar');
const dot = document.getElementById('dot');

let selectedIdx = -1;
let currentItems = [];

// Quick commands palette
const COMMANDS = [
  { cmd: '/status',      icon: '&#x2764;', title: 'Status',      desc: 'Health check & uptime' },
  { cmd: '/brief',       icon: '&#x1F4CB;', title: 'Brief',       desc: 'Daily activity summary' },
  { cmd: '/tasks',       icon: '&#x2611;', title: 'Tasks',       desc: 'Pending & recent tasks' },
  { cmd: '/logs',        icon: '&#x1F4DC;', title: 'Logs',        desc: 'Recent orchestrator logs' },
  { cmd: '/stats',       icon: '&#x1F4CA;', title: 'Stats',       desc: 'Event statistics' },
  { cmd: '/departments', icon: '&#x1F3DB;', title: 'Departments', desc: 'Six Ministries status' },
  { cmd: '/dashboard',   icon: '&#x2197;', title: 'Dashboard',   desc: 'Open full dashboard in browser' },
];

function resetSpotlight() {
  input.value = '';
  results.innerHTML = '';
  bar.classList.remove('has-results');
  selectedIdx = -1;
  currentItems = [];
  resize(64);
  input.focus();
  checkHealth();
}

function resize(h) {
  window.chrome?.webview?.postMessage(JSON.stringify({ action: 'resize', height: h }));
}

function close() {
  window.chrome?.webview?.postMessage(JSON.stringify({ action: 'close' }));
}

// Filter commands as user types
input.addEventListener('input', () => {
  const q = input.value.trim().toLowerCase();

  if (q === '' || q === '/') {
    showPalette(q === '/' ? COMMANDS : COMMANDS.slice(0, 4));
    return;
  }

  if (q.startsWith('/')) {
    const filtered = COMMANDS.filter(c =>
      c.cmd.includes(q) || c.title.toLowerCase().includes(q.slice(1))
    );
    showPalette(filtered);
    return;
  }

  // Free text: show "create task" option
  showPalette([
    { cmd: `task:${q}`, icon: '&#x2795;', title: `Create task: "${q}"`, desc: 'Send to Orchestrator' }
  ]);
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { close(); return; }

  if (e.key === 'ArrowDown' || (e.key === 'Tab' && !e.shiftKey)) {
    e.preventDefault();
    selectItem(selectedIdx + 1);
  } else if (e.key === 'ArrowUp' || (e.key === 'Tab' && e.shiftKey)) {
    e.preventDefault();
    selectItem(selectedIdx - 1);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (selectedIdx >= 0 && currentItems[selectedIdx]) {
      executeItem(currentItems[selectedIdx]);
    } else {
      // Execute typed text directly
      const q = input.value.trim();
      if (q.startsWith('/')) {
        const match = COMMANDS.find(c => c.cmd === q.split(' ')[0]);
        if (match) executeItem(match);
      } else if (q) {
        executeItem({ cmd: `task:${q}` });
      }
    }
  }
});

function showPalette(items) {
  currentItems = items;
  selectedIdx = items.length > 0 ? 0 : -1;

  if (items.length === 0) {
    results.innerHTML = '';
    bar.classList.remove('has-results');
    resize(64);
    return;
  }

  bar.classList.add('has-results');
  results.innerHTML = items.map((it, i) => `
    <div class="result-item ${i === 0 ? 'selected' : ''}" data-idx="${i}" onclick="executeItem(currentItems[${i}])">
      <span class="r-icon">${it.icon}</span>
      <div class="r-body">
        <div class="r-title">${it.title}</div>
        <div class="r-desc">${it.desc || ''}</div>
      </div>
      ${it.cmd.startsWith('/') ? `<span class="r-badge">${it.cmd}</span>` : ''}
    </div>
  `).join('');

  resize(64 + Math.min(items.length, 6) * 52 + 12);
}

function selectItem(idx) {
  if (currentItems.length === 0) return;
  selectedIdx = ((idx % currentItems.length) + currentItems.length) % currentItems.length;
  results.querySelectorAll('.result-item').forEach((el, i) => {
    el.classList.toggle('selected', i === selectedIdx);
  });
}

async function executeItem(item) {
  const cmd = item.cmd;

  if (cmd === '/dashboard') {
    window.chrome?.webview?.postMessage(JSON.stringify({ action: 'dashboard' }));
    return;
  }

  // Show loading
  results.innerHTML = '<div class="loading-bar"></div>';
  resize(64 + 40);

  try {
    let data;
    if (cmd.startsWith('task:')) {
      const text = cmd.slice(5);
      data = await fetch(`${API}/api/tasks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: text, source: 'claw', priority: 'MEDIUM' })
      }).then(r => r.json());
    } else {
      const routes = {
        '/status': '/api/health',
        '/brief': '/api/brief',
        '/tasks': '/api/tasks',
        '/logs': '/api/logs?limit=8',
        '/stats': '/api/stats',
        '/departments': '/api/departments',
      };
      const url = routes[cmd];
      if (!url) { showError('Unknown command'); return; }
      data = await fetch(API + url).then(r => r.json());
    }

    showResponse(cmd, data);
  } catch (err) {
    showError(`Cannot reach Orchestrator: ${err.message}`);
  }
}

function showResponse(cmd, data) {
  const json = JSON.stringify(data, null, 2);
  const lines = json.split('\n').length;
  const h = Math.min(64 + 24 + lines * 16 + 30, 420);

  results.innerHTML = `<div class="response"><pre class="ok">${escapeHtml(json)}</pre></div>`;
  resize(h);

  // Re-focus input for next command
  input.value = '';
  input.focus();
}

function showError(msg) {
  results.innerHTML = `<div class="response"><span class="error">${escapeHtml(msg)}</span></div>`;
  resize(64 + 60);
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function checkHealth() {
  try {
    await fetch(`${API}/api/health`, { signal: AbortSignal.timeout(2000) });
    dot.classList.add('online');
  } catch {
    dot.classList.remove('online');
  }
}

// Init
checkHealth();
</script>
</body>
</html>
