# Guard rules: decision<TAB>pattern<TAB>message
# Patterns are ERE (grep -E). First match wins.
# Lines starting with # are comments. Empty lines ignored.

# === Exfiltration ===
block	curl\s.*-[dFT]\s	Outbound data upload blocked
block	curl\s.*--data	Outbound data upload blocked
block	curl\s.*--upload	Outbound data upload blocked
block	wget\s.*--post	Outbound data upload blocked
block	Invoke-WebRequest.*-Body	Outbound data upload blocked
block	Invoke-RestMethod.*-Body	Outbound data upload blocked
block	irm\s.*-Body	Outbound data upload blocked
block	iwr\s.*-Body	Outbound data upload blocked

# === Sensitive file access ===
ask	\.env\b	Accessing .env file
ask	credentials	Accessing credentials file
ask	id_rsa|id_ed25519	Accessing SSH key
ask	\.pem\b	Accessing PEM certificate
ask	\.npmrc|\.pypirc	Accessing package manager credentials
ask	kubeconfig	Accessing kubeconfig

# === Encoding obfuscation ===
block	base64.*(encode|-e\b)	base64 encoding — exfiltration technique
block	certutil.*-encode	certutil encoding
block	ConvertTo-Base64|ToBase64String	Base64 encoding operation

# === Security bypass ===
ask	--no-verify	Bypassing safety checks
ask	skip.permissions|dangerously	Permission bypass keywords
block	DisableRealtimeMonitoring	Disabling Windows Defender
block	advfirewall.*off	Disabling firewall

# === Destructive: root-level ===
block	rm\s+-rf\s+/\s*$	rm -rf / — refusing
block	rm\s+-rf\s+/\*	rm -rf /* — refusing

# === Destructive: paths ===
ask	rm\s+-r[f ]*[A-Za-z]:	rm -rf on drive path — confirm first
ask	rm\s+-r[f ]*"/[a-z]	rm -rf on absolute path — confirm first
ask	Remove-Item.*-Recurse.*[A-Z]:	Recursive delete on drive path
ask	rmdir\s+/s	rmdir /s — recursive directory delete
ask	rd\s+/s	rd /s — recursive directory delete
ask	rm\s+.*\*	rm with wildcard — bulk file deletion
ask	del\s+/[sq].*\*	del with wildcard — bulk file deletion
ask	xargs\s+rm	xargs rm — batch file deletion
ask	find\s+.*-delete	find -delete — batch file deletion
ask	find\s+.*-exec\s+rm	find -exec rm — batch file deletion
ask	Remove-Item.*\*.*-Recurse	Remove-Item with wildcard + recurse
ask	Remove-Item.*-Recurse.*\*	Remove-Item recurse with wildcard

# === System/persistence ===
block	\bformat\s+[a-zA-Z]:	Formatting disk
block	\bdiskpart\b	diskpart detected
block	\bbcdedit\b	Boot config modification
block	reg\s+add.*\\Run\b	Registry autostart entry (persistence)
block	New-Service	Creating system service (persistence)
ask	schtasks.*/create	Creating scheduled task (persistence)

# === Git destructive ===
ask	git\s+reset\s+--hard	git reset --hard — confirm first
ask	git\s+clean\s+-f	git clean -f — confirm first
ask	git\s+push.*--force	git push --force — confirm first
ask	git\s+checkout\s+--\s+\.	git checkout -- . — discarding all changes
