<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orchestrator Flow</title>
<style>
:root {
  --bg:    #08080d; --card:  #0f0f17; --inset: #0a0a12;
  --b1:    #1c1c28; --b2:    #141420;
  --t1:    #dddde8; --t2:    #6b6b82; --t3:    #38384a;
  --green: #4ade80; --amber: #fbbf24; --red:   #f87171;
  --indigo:#818cf8; --blue:  #60a5fa;
  --cm-direct: #60a5fa; --cm-react: #4ade80; --cm-hypothesis: #fbbf24; --cm-designer: #818cf8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t1);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh;-webkit-font-smoothing:antialiased;}

#tb{position:fixed;top:0;left:0;right:0;height:40px;background:var(--card);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;}
.tl{font-size:11px;font-weight:700;color:var(--green);letter-spacing:2px;}
.ts{width:1px;height:16px;background:var(--b1);}
.th{font-size:10px;color:var(--t3);}
.tr{margin-left:auto;display:flex;align-items:center;gap:16px;}
.tp{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tst{font-size:10px;color:var(--green);}
.tst.off{color:var(--red);}
.flow-ind{display:flex;gap:8px;align-items:center;}
.flow-dot{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t3);}
.flow-dot .fd{width:6px;height:6px;border-radius:50%;opacity:.3;transition:opacity .4s;}
.flow-dot .fd.on{opacity:1;box-shadow:0 0 6px currentColor;}
.fd-collect{background:var(--blue);color:var(--blue);}
.fd-analysis{background:var(--amber);color:var(--amber);}
.fd-govern{background:var(--indigo);color:var(--indigo);}

#wrap{position:fixed;top:40px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab;}
#wrap.drag{cursor:grabbing;}
#cv{position:absolute;width:5000px;height:4000px;background-image:radial-gradient(circle,#18182a 1px,transparent 1px);background-size:28px 28px;transform-origin:0 0;}

.card{position:absolute;background:var(--card);border:1px solid var(--b1);border-radius:10px;}
.ch{padding:11px 14px 10px;border-bottom:1px solid var(--b2);display:flex;align-items:center;gap:8px;}
.ci{font-size:13px;} .ct{font-size:11px;font-weight:600;letter-spacing:.2px;}
.cb{padding:14px 16px;}
.badge{margin-left:auto;font-size:10px;padding:2px 8px;border-radius:12px;}
.bg{color:var(--green);background:#0d1f12;} .bd{color:var(--t3);background:var(--inset);}
.bb{color:var(--blue);background:#0d1320;} .bi{color:var(--indigo);background:#100d1f;}
.ba{color:var(--amber);background:#1f1800;font-size:10px;padding:2px 8px;border-radius:12px;}
.br{color:var(--red);background:#1f0d0d;font-size:10px;padding:2px 8px;border-radius:12px;}

.rl{display:flex;flex-direction:column;gap:3px;}
.ri{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:5px;background:var(--inset);}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dg{background:var(--green);box-shadow:0 0 5px var(--green);}
.da{background:var(--amber);} .dd{background:var(--t3);} .dr{background:var(--red);}
.ll{font-size:11px;color:var(--t1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
.ls{font-size:10px;color:var(--t2);}
.lr{margin-left:auto;}

.lt{display:flex;flex-direction:column;gap:3px;}
.li{display:flex;align-items:flex-start;gap:8px;padding:6px 9px;border-radius:5px;background:var(--inset);}
.ltag{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;flex-shrink:0;margin-top:1px;}
.ti{color:var(--blue);background:#0d1320;} .ta{color:var(--indigo);background:#100d1f;}
.tg{color:var(--green);background:#0d1f12;} .te{color:var(--red);background:#1f0d0d;}
.tw{color:var(--amber);background:#1f1800;}
.lsrc{font-size:10px;color:var(--t3);min-width:52px;flex-shrink:0;margin-top:2px;}
.lmsg{font-size:11px;color:var(--t2);flex:1;line-height:1.4;}
.ltm{font-size:10px;color:var(--t3);flex-shrink:0;margin-top:2px;}

/* cognition mode badges */
.cm-badge{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:600;letter-spacing:.3px;}
.cm-direct{color:var(--cm-direct);background:#0d1320;}
.cm-react{color:var(--cm-react);background:#0d1f12;}
.cm-hypothesis{color:var(--cm-hypothesis);background:#1f1800;}
.cm-designer{color:var(--cm-designer);background:#100d1f;}

/* blast radius badges */
.blast-badge{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:600;}
.blast-low{color:var(--green);background:#0d1f12;}
.blast-medium{color:var(--amber);background:#1f1800;}
.blast-high{color:var(--red);background:#1f0d0d;}

/* dept mini bar */
.dept-bar{height:3px;background:var(--b1);border-radius:2px;overflow:hidden;margin-top:4px;width:100%;}
.dept-bar-fill{height:100%;border-radius:2px;transition:width .4s;}

/* task status icons */
.task-icon{font-size:11px;flex-shrink:0;}

/* schedule countdown */
.sched-item{display:flex;justify-content:space-between;align-items:center;padding:6px 9px;border-radius:5px;background:var(--inset);}
.sched-name{font-size:11px;color:var(--t1);}
.sched-next{font-size:10px;color:var(--t2);}
.sched-cd{font-size:10px;color:var(--green);font-variant-numeric:tabular-nums;}

/* empty state */
.empty-state{font-size:11px;color:var(--t3);text-align:center;padding:20px 0;}

#zm{position:fixed;bottom:16px;left:16px;z-index:100;display:flex;gap:3px;}
.zb{width:26px;height:26px;background:var(--card);border:1px solid var(--b1);border-radius:5px;color:var(--t2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.zb:hover{background:#13131e;color:var(--t1);}
.zp{height:26px;padding:0 9px;background:var(--card);border:1px solid var(--b1);border-radius:5px;font-size:10px;color:var(--t3);display:flex;align-items:center;}
#mm{position:fixed;bottom:16px;right:16px;width:150px;height:90px;background:var(--card);border:1px solid var(--b1);border-radius:8px;overflow:hidden;z-index:100;}
#mmvp{position:absolute;border:1px solid #4ade8055;background:#4ade8008;border-radius:2px;}
.mml{position:absolute;bottom:5px;left:7px;font-size:9px;color:var(--t3);}

/* refresh indicator */
.refresh-spin{animation:spin 1s linear infinite;display:inline-block;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="tb">
  <span class="tl">ORCH</span><div class="ts"></div>
  <span class="th">数据流视图</span>
  <div class="tr">
    <div class="flow-ind">
      <div class="flow-dot"><span class="fd fd-collect" id="fi-collect"></span>采集</div>
      <div class="flow-dot"><span class="fd fd-analysis" id="fi-analysis"></span>分析</div>
      <div class="flow-dot"><span class="fd fd-govern" id="fi-govern"></span>治理</div>
    </div>
    <div class="ts"></div>
    <div class="tp" id="sys-pulse"></div><span class="tst" id="sys-status">连接中...</span>
    <span class="th" id="refresh-timer"></span>
  </div>
</div>

<div id="wrap"><div id="cv">

<!-- ── 主流程图卡片 ── -->
<div class="card" style="left:60px;top:60px;width:760px;">
  <div class="ch">
    <span class="ci">🔀</span>
    <span class="ct">Agent 数据流</span>
    <span class="badge bb" id="flow-badge">实时动线</span>
  </div>
  <div class="cb" style="padding:16px 16px 8px;">
    <svg id="flowsvg" viewBox="0 0 728 680" width="728" height="680" style="display:block;overflow:visible;">
    <defs>
      <!-- Glow filters -->
      <filter id="fg" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="fa" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="2.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="fi" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>

      <!-- ── Connection paths ── -->
      <!-- Source → Collector (6 sources) -->
      <path id="pc0" d="M65,66  C65,110 340,110 340,148"/>
      <path id="pc1" d="M185,66 C185,110 340,110 340,148"/>
      <path id="pc2" d="M305,66 C305,110 340,110 340,148"/>
      <path id="pc3" d="M425,66 C425,110 340,110 340,148"/>
      <path id="pc4s" d="M545,66 C545,110 340,110 340,148"/>
      <path id="pc5" d="M665,66 C665,110 340,110 340,148"/>
      <!-- Collector → DB -->
      <path id="pc6" d="M340,180 L340,248"/>
      <!-- Analysis: DB → Analyst, DB → Insights, Analyst → Insights -->
      <path id="pa0" d="M340,280 C340,330 180,330 180,358"/>
      <path id="pa1" d="M340,280 C340,330 500,330 500,358"/>
      <path id="pa2" d="M260,375 C340,375 420,375 475,375"/>
      <!-- Governance: Insights → Governor -->
      <path id="pg0" d="M500,390 L500,458"/>
      <!-- Governor → CogMode classifier -->
      <path id="pg0b" d="M500,490 C500,510 340,510 340,528"/>
      <!-- CogMode → Scrutiny (门下省) -->
      <path id="pg1" d="M340,560 L340,598"/>
      <!-- Scrutiny → Departments (fan out) -->
      <path id="pe0" d="M340,630 C340,650 75,650 75,668"/>
      <path id="pe1" d="M340,630 C340,650 205,650 205,668"/>
      <path id="pe2" d="M340,630 C340,650 335,650 335,668"/>
      <path id="pe3" d="M340,630 C340,650 465,650 465,668"/>
      <path id="pe4" d="M340,630 C340,650 595,650 595,668"/>
      <path id="pe5" d="M340,630 C340,650 665,650 665,668"/>
    </defs>

    <!-- ════ VISIBLE LINES ════ -->
    <g class="lines-collect">
      <use href="#pc0" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.25"/>
      <use href="#pc1" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.25"/>
      <use href="#pc2" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.15"/>
      <use href="#pc3" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.15"/>
      <use href="#pc4s" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.15"/>
      <use href="#pc5" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.15"/>
      <use href="#pc6" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.3"/>
    </g>
    <g class="lines-analysis">
      <use href="#pa0" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.2"/>
      <use href="#pa1" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.2"/>
      <use href="#pa2" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.2"/>
    </g>
    <g class="lines-govern">
      <use href="#pg0" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.2"/>
      <use href="#pg0b" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.2"/>
      <use href="#pg1" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.2"/>
      <use href="#pe0" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.15"/>
      <use href="#pe1" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.15"/>
      <use href="#pe2" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.15"/>
      <use href="#pe3" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.15"/>
      <use href="#pe4" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.15"/>
      <use href="#pe5" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.15"/>
    </g>

    <!-- ════ PARTICLES ════ -->
    <g id="particles-collect">
      <circle r="3.5" fill="#60a5fa" opacity="0.9"><animateMotion dur="2.2s" begin="0s" repeatCount="indefinite"><mpath href="#pc0"/></animateMotion></circle>
      <circle r="2.5" fill="#60a5fa" opacity="0.5"><animateMotion dur="2.2s" begin="0.55s" repeatCount="indefinite"><mpath href="#pc0"/></animateMotion></circle>
      <circle r="3.5" fill="#60a5fa" opacity="0.9"><animateMotion dur="2.2s" begin="1.1s" repeatCount="indefinite"><mpath href="#pc0"/></animateMotion></circle>
      <circle r="3.5" fill="#60a5fa" opacity="0.9"><animateMotion dur="2.2s" begin="0.3s" repeatCount="indefinite"><mpath href="#pc1"/></animateMotion></circle>
      <circle r="2.5" fill="#60a5fa" opacity="0.5"><animateMotion dur="2.2s" begin="0.85s" repeatCount="indefinite"><mpath href="#pc1"/></animateMotion></circle>
      <circle r="2" fill="#60a5fa" opacity="0.3"><animateMotion dur="4s" begin="0s" repeatCount="indefinite"><mpath href="#pc2"/></animateMotion></circle>
      <circle r="2" fill="#60a5fa" opacity="0.3"><animateMotion dur="4s" begin="1.5s" repeatCount="indefinite"><mpath href="#pc3"/></animateMotion></circle>
      <circle r="2" fill="#60a5fa" opacity="0.3"><animateMotion dur="4s" begin="0.8s" repeatCount="indefinite"><mpath href="#pc4s"/></animateMotion></circle>
      <circle r="2" fill="#60a5fa" opacity="0.3"><animateMotion dur="4s" begin="2s" repeatCount="indefinite"><mpath href="#pc5"/></animateMotion></circle>
      <circle r="4" fill="#818cf8" opacity="0.9"><animateMotion dur="1.2s" begin="0s" repeatCount="indefinite"><mpath href="#pc6"/></animateMotion></circle>
      <circle r="3" fill="#818cf8" opacity="0.5"><animateMotion dur="1.2s" begin="0.4s" repeatCount="indefinite"><mpath href="#pc6"/></animateMotion></circle>
      <circle r="4" fill="#818cf8" opacity="0.9"><animateMotion dur="1.2s" begin="0.8s" repeatCount="indefinite"><mpath href="#pc6"/></animateMotion></circle>
    </g>

    <g id="particles-analysis" opacity="0.15">
      <circle r="3.5" fill="#fbbf24"><animateMotion dur="3s" begin="0s" repeatCount="indefinite"><mpath href="#pa0"/></animateMotion></circle>
      <circle r="2.5" fill="#fbbf24"><animateMotion dur="3s" begin="1s" repeatCount="indefinite"><mpath href="#pa0"/></animateMotion></circle>
      <circle r="3.5" fill="#fbbf24"><animateMotion dur="3s" begin="0.5s" repeatCount="indefinite"><mpath href="#pa1"/></animateMotion></circle>
      <circle r="2.5" fill="#fbbf24"><animateMotion dur="3s" begin="1.5s" repeatCount="indefinite"><mpath href="#pa1"/></animateMotion></circle>
      <circle r="3" fill="#fbbf24"><animateMotion dur="2s" begin="0s" repeatCount="indefinite"><mpath href="#pa2"/></animateMotion></circle>
    </g>

    <g id="particles-govern" opacity="0.15">
      <circle r="3.5" fill="#818cf8"><animateMotion dur="2s" begin="0s" repeatCount="indefinite"><mpath href="#pg0"/></animateMotion></circle>
      <circle r="2.5" fill="#818cf8"><animateMotion dur="2s" begin="0.7s" repeatCount="indefinite"><mpath href="#pg0"/></animateMotion></circle>
      <circle r="3" fill="#818cf8"><animateMotion dur="2.5s" begin="0s" repeatCount="indefinite"><mpath href="#pg0b"/></animateMotion></circle>
      <circle r="3.5" fill="#fbbf24"><animateMotion dur="2s" begin="0s" repeatCount="indefinite"><mpath href="#pg1"/></animateMotion></circle>
      <circle r="2.5" fill="#fbbf24"><animateMotion dur="2s" begin="0.6s" repeatCount="indefinite"><mpath href="#pg1"/></animateMotion></circle>
      <circle r="3" fill="#4ade80"><animateMotion dur="2.5s" begin="0s" repeatCount="indefinite"><mpath href="#pe0"/></animateMotion></circle>
      <circle r="3" fill="#4ade80"><animateMotion dur="2.5s" begin="0.4s" repeatCount="indefinite"><mpath href="#pe1"/></animateMotion></circle>
      <circle r="3" fill="#4ade80"><animateMotion dur="2.5s" begin="0.8s" repeatCount="indefinite"><mpath href="#pe2"/></animateMotion></circle>
      <circle r="3" fill="#4ade80"><animateMotion dur="2.5s" begin="1.2s" repeatCount="indefinite"><mpath href="#pe3"/></animateMotion></circle>
      <circle r="3" fill="#4ade80"><animateMotion dur="2.5s" begin="1.6s" repeatCount="indefinite"><mpath href="#pe4"/></animateMotion></circle>
      <circle r="3" fill="#4ade80"><animateMotion dur="2.5s" begin="2.0s" repeatCount="indefinite"><mpath href="#pe5"/></animateMotion></circle>
    </g>

    <!-- ════ NODES ════ -->

    <!-- ── LAYER LABELS ── -->
    <text x="4" y="56" fill="#38384a" font-size="9" font-weight="600" letter-spacing=".5">数据源</text>
    <text x="4" y="170" fill="#38384a" font-size="9" font-weight="600" letter-spacing=".5">采集</text>
    <text x="4" y="270" fill="#38384a" font-size="9" font-weight="600" letter-spacing=".5">存储</text>
    <text x="4" y="376" fill="#38384a" font-size="9" font-weight="600" letter-spacing=".5">分析</text>
    <text x="4" y="476" fill="#38384a" font-size="9" font-weight="600" letter-spacing=".5">治理</text>
    <text x="4" y="546" fill="#38384a" font-size="9" font-weight="600" letter-spacing=".5">认知</text>
    <text x="4" y="616" fill="#38384a" font-size="9" font-weight="600" letter-spacing=".5">审查</text>
    <text x="4" y="686" fill="#38384a" font-size="9" font-weight="600" letter-spacing=".5">六部</text>

    <!-- Divider lines -->
    <line x1="36" y1="95"  x2="720" y2="95"  stroke="#141420" stroke-width="1"/>
    <line x1="36" y1="200" x2="720" y2="200" stroke="#141420" stroke-width="1"/>
    <line x1="36" y1="310" x2="720" y2="310" stroke="#141420" stroke-width="1"/>
    <line x1="36" y1="420" x2="720" y2="420" stroke="#141420" stroke-width="1"/>
    <line x1="36" y1="520" x2="720" y2="520" stroke="#141420" stroke-width="1"/>
    <line x1="36" y1="590" x2="720" y2="590" stroke="#141420" stroke-width="1"/>
    <line x1="36" y1="655" x2="720" y2="655" stroke="#141420" stroke-width="1"/>

    <!-- ── 6 Source nodes ── -->
    <g id="n-claude" class="node">
      <rect x="5" y="34" width="120" height="32" rx="5" fill="#0d1520" stroke="#1a2a40"/>
      <circle cx="20" cy="50" r="3.5" fill="var(--t3)" id="dot-claude"/>
      <text x="65" y="46" text-anchor="middle" fill="#dddde8" font-size="11" font-weight="600">Claude</text>
      <text x="65" y="59" text-anchor="middle" fill="#6b6b82" font-size="9">会话采集</text>
    </g>
    <g id="n-browser" class="node">
      <rect x="125" y="34" width="120" height="32" rx="5" fill="#0d1520" stroke="#1a2a40"/>
      <circle cx="140" cy="50" r="3.5" fill="var(--t3)" id="dot-browser"/>
      <text x="185" y="46" text-anchor="middle" fill="#dddde8" font-size="11" font-weight="600">Browser</text>
      <text x="185" y="59" text-anchor="middle" fill="#6b6b82" font-size="9">浏览历史</text>
    </g>
    <g id="n-git" class="node">
      <rect x="245" y="34" width="120" height="32" rx="5" fill="#0a0a12" stroke="#1c1c28"/>
      <circle cx="260" cy="50" r="3.5" fill="var(--t3)" id="dot-git"/>
      <text x="305" y="46" text-anchor="middle" fill="#8888a0" font-size="11" font-weight="600">Git</text>
      <text x="305" y="59" text-anchor="middle" fill="#6b6b82" font-size="9">提交记录</text>
    </g>
    <g id="n-steam" class="node">
      <rect x="365" y="34" width="120" height="32" rx="5" fill="#0a0a12" stroke="#1c1c28"/>
      <circle cx="380" cy="50" r="3.5" fill="var(--t3)" id="dot-steam"/>
      <text x="425" y="46" text-anchor="middle" fill="#8888a0" font-size="11" font-weight="600">Steam</text>
      <text x="425" y="59" text-anchor="middle" fill="#6b6b82" font-size="9">游戏时长</text>
    </g>
    <g id="n-ytmusic" class="node">
      <rect x="485" y="34" width="120" height="32" rx="5" fill="#0a0a12" stroke="#1c1c28"/>
      <circle cx="500" cy="50" r="3.5" fill="var(--t3)" id="dot-ytmusic"/>
      <text x="545" y="46" text-anchor="middle" fill="#8888a0" font-size="11" font-weight="600">YT Music</text>
      <text x="545" y="59" text-anchor="middle" fill="#6b6b82" font-size="9">音乐记录</text>
    </g>
    <g id="n-codebase" class="node">
      <rect x="605" y="34" width="120" height="32" rx="5" fill="#0a0a12" stroke="#1c1c28"/>
      <circle cx="620" cy="50" r="3.5" fill="var(--t3)" id="dot-codebase"/>
      <text x="665" y="46" text-anchor="middle" fill="#8888a0" font-size="11" font-weight="600">Codebase</text>
      <text x="665" y="59" text-anchor="middle" fill="#6b6b82" font-size="9">代码扫描</text>
    </g>

    <!-- ── Collector ── -->
    <g id="n-collector">

</div>
<div id="mm"><div id="mmvp"></div><span class="mml">导航</span></div>

<script>
/* ── pan/zoom ── */
const wrap=document.getElementById('wrap'),cv=document.getElementById('cv');
let tx=-30,ty=-20,sc=0.75,drag=false,sx,sy,stx,sty;
function apply(){
  cv.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;
  document.getElementById('zpct').textContent=Math.round(sc*100)+'%';
  const mm=document.getElementById('mm'),vp=document.getElementById('mmvp');
  vp.style.cssText=`left:${-tx/sc*(mm.offsetWidth/5000)}px;top:${-ty/sc*(mm.offsetHeight/4000)}px;width:${wrap.offsetWidth/sc*(mm.offsetWidth/5000)}px;height:${wrap.offsetHeight/sc*(mm.offsetHeight/4000)}px`;
}
wrap.addEventListener('mousedown',e=>{if(e.target.closest('.card'))return;drag=true;sx=e.clientX;sy=e.clientY;stx=tx;sty=ty;wrap.classList.add('drag');});
window.addEventListener('mousemove',e=>{if(!drag)return;tx=stx+(e.clientX-sx);ty=sty+(e.clientY-sy);apply();});
window.addEventListener('mouseup',()=>{drag=false;wrap.classList.remove('drag');});
wrap.addEventListener('wheel',e=>{e.preventDefault();const d=e.deltaY>0?.92:1.09,ns=Math.min(3,Math.max(.2,sc*d)),r=wrap.getBoundingClientRect();tx=(e.clientX-r.left)-(e.clientX-r.left-tx)*d;ty=(e.clientY-r.top)-(e.clientY-r.top-ty)*d;sc=ns;apply();},{passive:false});
document.getElementById('zi').onclick=()=>{sc=Math.min(3,sc*1.15);apply();};
document.getElementById('zo').onclick=()=>{sc=Math.max(.2,sc/1.15);apply();};
document.getElementById('zf').onclick=()=>{tx=-30;ty=-20;sc=0.75;apply();};
apply();

/* ── Data state ── */
let pipelineData = { status: {}, logs: [], tasks: [], depts: {} };
let lastRefresh = 0;
let apiOnline = false;

/* ── Time helpers ── */
function relTime(ts) {
  if (!ts) return '--';
  const diff = Date.now() - new Date(ts).getTime();
  if (diff < 0) return '刚刚';
  const s = Math.floor(diff / 1000);
  if (s < 60) return `${s}秒前`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}分钟前`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}小时前`;
  return `${Math.floor(h/24)}天前`;
}

function countdown(ts) {
  if (!ts) return '--';
  const diff = new Date(ts).getTime() - Date.now();
  if (diff <= 0) return '即将';
  const m = Math.floor(diff / 60000);
  const h = Math.floor(m / 60);
  if (h > 0) return `${h}时${m%60}分`;
  return `${m}分`;
}

/* ── Level badge class ── */
function levelClass(level) {
  if (!level) return 'ti';
  const l = level.toLowerCase();
  if (l === 'error' || l === 'err') return 'te';
  if (l === 'warn' || l === 'warning') return 'tw';
  if (l === 'info') return 'ti';
  if (l === 'gov' || l === 'governance') return 'tg';
  if (l === 'auto' || l === 'autonomous') return 'ta';
  return 'ti';
}

/* ── Cognition mode badge ── */
function cmBadge(mode) {
  if (!mode) return '';
  const m = mode.toLowerCase();
  const cls = ['direct','react','hypothesis','designer'].includes(m) ? `cm-${m}` : 'cm-direct';
  return `<span class="cm-badge ${cls}">${mode}</span>`;
}

/* ── Blast radius badge ── */
function blastBadge(radius) {
  if (!radius) return '';
  const r = radius.toLowerCase();
  const cls = r === 'high' ? 'blast-high' : r === 'medium' ? 'blast-medium' : 'blast-low';
  const label = r === 'high' ? '高' : r === 'medium' ? '中' : '低';
  return `<span class="blast-badge ${cls}">💥${label}</span>`;
}

/* ── Status dot color ── */
function statusColor(status) {
  if (!status) return 'var(--t3)';
  const s = status.toLowerCase();
  if (s === 'ok' || s === 'active' || s === 'running') return 'var(--green)';
  if (s === 'error' || s === 'failed') return 'var(--red)';
  if (s === 'idle' || s === 'pending') return 'var(--amber)';
  return 'var(--t3)';
}

/* ── Task status icon ── */
function taskIcon(status) {
  if (!status) return '⏳';
  const s = status.toLowerCase();
  if (s === 'completed' || s === 'done' || s === 'success') return '✅';
  if (s === 'running' || s === 'active') return '🔄';
  if (s === 'failed' || s === 'error') return '❌';
  if (s === 'rejected') return '🚫';
  if (s === 'pending' || s === 'queued') return '⏳';
  return '📋';
}

/* ── Department name map ── */
const deptNames = {
  gongbu: '工部', hubu: '户部', xingbu: '刑部',
  libu: '礼部', bingbu: '兵部', libu2: '吏部',
  engineering: '工部', finance: '户部', justice: '刑部',
  rites: '礼部', military: '兵部', personnel: '吏部'
};
const deptColors = {
  gongbu: 'var(--green)', hubu: 'var(--blue)', xingbu: 'var(--red)',
  libu: 'var(--indigo)', bingbu: 'var(--amber)', libu2: '#9090a8',
  engineering: 'var(--green)', finance: 'var(--blue)', justice: 'var(--red)',
  rites: 'var(--indigo)', military: 'var(--amber)', personnel: '#9090a8'
};

/* ── API fetch with fallback ── */
async function fetchJSON(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch(e) {
    return null;
  }
}

/* ── Refresh pipeline data ── */
async function refreshPipeline() {
  const [status, logs, tasks, depts] = await Promise.all([
    fetchJSON('/api/pipeline/status'),
    fetchJSON('/api/pipeline/logs?limit=15'),
    fetchJSON('/api/pipeline/tasks?limit=10'),
    fetchJSON('/api/pipeline/departments'),
  ]);

  apiOnline = !!(status || logs || tasks || depts);
  pipelineData = {
    status: status || {},
    logs: Array.isArray(logs) ? logs : [],
    tasks: Array.isArray(tasks) ? tasks : [],
    depts: depts || {},
  };
  lastRefresh = Date.now();

  updateSystemStatus();
  updateNodes();
  updateCards();
  updateFlowState();
}

/* ── Update system status indicator ── */
function updateSystemStatus() {
  const pulse = document.getElementById('sys-pulse');
  const label = document.getElementById('sys-status');
  if (apiOnline) {
    pulse.style.background = 'var(--green)';
    label.textContent = '运行中';
    label.className = 'tst';
  } else {
    pulse.style.background = 'var(--red)';
    label.textContent = '离线';
    label.className = 'tst off';
  }
}

/* ── Update SVG nodes based on API data ── */
function updateNodes() {
  const s = pipelineData.status;

  // Update collector dots
  const collectors = s.collectors || {};
  const collectorNames = ['claude','browser','git','steam','ytmusic','codebase'];
  for (const name of collectorNames) {
    const dot = document.getElementById(`dot-${name}`);
    if (!dot) continue;
    const info = collectors[name];
    if (info) {
      dot.setAttribute('fill', statusColor(info.status));
      if (info.status === 'ok' || info.status === 'active') {
        dot.setAttribute('filter', 'url(#fg)');
      } else {
        dot.removeAttribute('filter');
      }
    }
  }

  // Update Governor node
  const gov = s.governance || {};
  const govSub = document.getElementById('gov-sub');
  if (govSub) {
    const running = gov.tasks_running ?? '--';
    const pending = gov.tasks_pending ?? '--';
    govSub.textContent = `运行: ${running} · 待处理: ${pending}`;
  }
  const dotGov = document.getElementById('dot-governor');
  if (dotGov && gov.tasks_running > 0) {
    dotGov.setAttribute('fill', 'var(--green)');
    dotGov.setAttribute('filter', 'url(#fg)');
  }

  // Update department subtexts
  const depts = pipelineData.depts;
  if (depts && typeof depts === 'object') {
    for (const [key, info] of Object.entries(depts)) {
      // Try to match dept key to node
      const subEl = document.getElementById(`dept-sub-${key}`);
      if (subEl && info) {
        const total = info.total ?? 0;
        const rate = info.success_rate != null ? `${Math.round(info.success_rate * 100)}%` : '--';
        subEl.textContent = `${total}任务 · ${rate}`;
      }
    }
  }
}

/* ── Update info cards ── */
function updateCards() {
  updateTasksCard();
  updateDeptCard();
  updateScheduleCard();
  updateLogsCard();
}

/* ── Tasks card ── */
function updateTasksCard() {
  const list = document.getElementById('tasks-list');
  const countBadge = document.getElementById('task-count');
  const tasks = pipelineData.tasks;

  if (!tasks.length) {
    list.innerHTML = '<div class="empty-state">暂无任务</div>';
    countBadge.textContent = '0';
    return;
  }

  countBadge.textContent = tasks.length;
  list.innerHTML = tasks.map(t => {
    const icon = taskIcon(t.status);
    const action = t.action || t.description || t.title || '未知任务';
    const dept = t.department || t.dept || '';
    const deptLabel = deptNames[dept] || dept || '';
    const mode = t.cognition_mode || t.cognitive_mode || '';
    const blast = t.blast_radius || '';
    return `<div class="ri">
      <span class="task-icon">${icon}</span>
      <div style="flex:1;min-width:0">
        <div class="ll">${action}</div>
        <div class="ls" style="display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;">
          ${deptLabel ? `<span style="color:${deptColors[dept]||'var(--t2)'}">${deptLabel}</span>` : ''}
          ${cmBadge(mode)}
          ${blastBadge(blast)}
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── Department card ── */
function updateDeptCard() {
  const list = document.getElementById('dept-list');
  const depts = pipelineData.depts;

  if (!depts || !Object.keys(depts).length) {
    list.innerHTML = '<div class="empty-state">暂无部门数据</div>';
    return;
  }

  list.innerHTML = Object.entries(depts).map(([key, info]) => {
    const name = deptNames[key] || key;
    const color = deptColors[key] || 'var(--t2)';
    const total = info.total ?? 0;
    const rate = info.success_rate != null ? Math.round(info.success_rate * 100) : 0;
    const recent = info.latest_action || info.recent || '';
    return `<div class="ri" style="flex-direction:column;align-items:stretch;gap:4px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:11px;font-weight:600;color:${color}">${name}</span>
        <span style="font-size:10px;color:var(--t2)">${total} 任务</span>
      </div>
      <div class="dept-bar"><div class="dept-bar-fill" style="width:${rate}%;background:${color}"></div></div>
      <div style="display:flex;justify-content:space-between;">
        <span style="font-size:9px;color:var(--t3)">成功率 ${rate}%</span>
        ${recent ? `<span style="font-size:9px;color:var(--t3);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${recent}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

/* ── Schedule card ── */
function updateScheduleCard() {
  const el = document.getElementById('schedule-info');
  const sched = pipelineData.status.scheduler;

  if (!sched || !sched.jobs || !sched.jobs.length) {
    // Show default schedule info if API has no scheduler data
    const defaultJobs = [
      { name: '数据采集', interval: '每小时' },
      { name: '每日分析', interval: '每6小时' },
      { name: '洞察生成', interval: '每日' },
      { name: '治理检查', interval: '每日' },
    ];
    el.innerHTML = defaultJobs.map(j => `
      <div class="sched-item">
        <span class="sched-name">${j.name}</span>
        <span class="sched-next">${j.interval}</span>
        <span class="sched-cd">--</span>
      </div>
    `).join('');
    return;
  }

  el.innerHTML = sched.jobs.map(j => {
    const name = j.name || j.id || '任务';
    const next = j.next_run ? new Date(j.next_run).toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) : '--';
    const cd = j.next_run ? countdown(j.next_run) : '--';
    return `<div class="sched-item">
      <span class="sched-name">${name}</span>
      <span class="sched-next">${next}</span>
      <span class="sched-cd">${cd}</span>
    </div>`;
  }).join('');
}

/* ── Logs card ── */
function updateLogsCard() {
  const list = document.getElementById('logs-list');
  const logs = pipelineData.logs;

  if (!logs.length) {
    list.innerHTML = '<div class="empty-state">暂无日志</div>';
    return;
  }

  list.innerHTML = logs.map(l => {
    const level = (l.level || 'INFO').toUpperCase();
    const cls = levelClass(l.level);
    const src = l.source || l.component || '--';
    const msg = l.message || l.msg || '';
    const time = l.created_at ? relTime(l.created_at) : (l.timestamp ? relTime(l.timestamp) : '--');
    return `<div class="li">
      <span class="ltag ${cls}">${level}</span>
      <span class="lsrc">${src}</span>
      <span class="lmsg">${msg}</span>
      <span class="ltm">${time}</span>
    </div>`;
  }).join('');
}

/* ── Auto flow state detection ── */
function updateFlowState() {
  const s = pipelineData.status;
  const logs = pipelineData.logs || [];
  const now = Date.now();
  const fiveMin = 5 * 60 * 1000;

  const recentCollect = logs.some(l =>
    (l.source === 'collector' || l.source === 'collectors') &&
    (now - new Date(l.created_at || l.timestamp).getTime()) < fiveMin
  );
  const recentAnalysis = logs.some(l =>
    (l.source === 'insights' || l.source === 'analyst' || l.source === 'analysis') &&
    (now - new Date(l.created_at || l.timestamp).getTime()) < fiveMin
  );
  const hasRunning = (s?.governance?.tasks_running ?? 0) > 0;

  // Update particle group opacities
  const pc = document.getElementById('particles-collect');
  const pa = document.getElementById('particles-analysis');
  const pg = document.getElementById('particles-govern');
  pc.style.opacity = recentCollect ? '1' : '0.15';
  pa.style.opacity = recentAnalysis ? '1' : '0.15';
  pg.style.opacity = hasRunning ? '1' : '0.15';

  // Update flow indicator dots in toolbar
  document.getElementById('fi-collect').classList.toggle('on', recentCollect);
  document.getElementById('fi-analysis').classList.toggle('on', recentAnalysis);
  document.getElementById('fi-govern').classList.toggle('on', hasRunning);

  // If nothing is active but API is online, show collect at low opacity
  if (apiOnline && !recentCollect && !recentAnalysis && !hasRunning) {
    pc.style.opacity = '0.3';
  }
}

/* ── Refresh timer display ── */
function updateRefreshTimer() {
  const el = document.getElementById('refresh-timer');
  if (!lastRefresh) { el.textContent = ''; return; }
  const ago = Math.floor((Date.now() - lastRefresh) / 1000);
  const next = Math.max(0, 30 - ago);
  el.textContent = `刷新: ${next}s`;
}

/* ── Schedule countdown updater ── */
function updateCountdowns() {
  // Re-render schedule card to update countdowns
  if (pipelineData.status.scheduler) {
    updateScheduleCard();
  }
}

/* ── Init ── */
refreshPipeline();
setInterval(refreshPipeline, 30000);
setInterval(updateRefreshTimer, 1000);
setInterval(updateCountdowns, 60000);
</script>
