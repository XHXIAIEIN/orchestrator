<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orchestrator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fafaf8; --surface: #fff; --border: #e8e8e4;
  --text: #1a1a1a; --text-mid: #6b6b68; --text-dim: #a0a09c;
  --accent: #635bff; --green: #0a7d54; --red: #c0392b; --amber: #b8860b;
  --mono: 'IBM Plex Mono', 'JetBrains Mono', monospace;
  --serif: 'Noto Serif SC', 'Georgia', serif;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 32px rgba(0,0,0,.08), 0 4px 8px rgba(0,0,0,.04);
  --radius: 6px;
}
html { font-size: 15px; }
body { font-family: var(--mono); background: var(--bg); color: var(--text); line-height: 1.7; -webkit-font-smoothing: antialiased; }
::selection { background: #635bff22; }

/* ── Nav ── */
nav {
  position: sticky; top: 0; z-index: 50; background: rgba(250,250,248,.92);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 32px; height: 48px; font-size: .75rem;
}
.nav-left { display: flex; align-items: center; gap: 20px; }
.nav-logo { font-family: var(--serif); font-size: 1.05rem; color: var(--text); font-weight: 500; letter-spacing: -.02em; }
.nav-links { display: flex; gap: 4px; }
.nav-link {
  padding: 4px 12px; border-radius: var(--radius);
  color: var(--text-mid); text-decoration: none; font-size: .7rem;
  letter-spacing: .5px; text-transform: uppercase; transition: all .15s;
  border: none; background: transparent;
}
.nav-link:hover { background: #f0f0ec; color: var(--text); }
.nav-link.active { background: var(--text); color: var(--bg); }
.nav-link.api-link { color: var(--text-dim); font-size: .65rem; margin-left: 4px; }
.nav-link.api-link:hover { color: var(--accent); background: transparent; }
.nav-right { display: flex; align-items: center; gap: 16px; font-size: .7rem; color: var(--text-dim); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 4px; }
.status-dot.off { background: var(--red); }

/* ── Layout ── */
.container { max-width: 1200px; margin: 0 auto; padding: 0 32px 80px; }

/* ── Hero ── */
.hero { padding: 56px 0 48px; border-bottom: 1px solid var(--border); }
.hero-title {
  font-family: var(--serif); font-size: 2.8rem; line-height: 1.2;
  color: var(--text); margin-bottom: 6px; font-weight: 400; letter-spacing: -.02em;
}
.hero-title sup { font-size: .85rem; color: var(--text-dim); font-family: var(--mono); vertical-align: super; }
.roast {
  font-family: var(--serif); font-size: 1.2rem; line-height: 1.9;
  color: var(--text-mid); font-style: italic; max-width: 680px; margin-top: 24px;
  opacity: 0; animation: fadeIn .6s ease .15s forwards;
}
.roast-footer { margin-top: 18px; display: flex; align-items: center; gap: 12px; }
.roast-sig { font-size: .6rem; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-dim); }
.voice-btn {
  background: none; border: 1px solid var(--border); border-radius: 50%; width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-dim);
  transition: all .2s;
}
.voice-btn:hover { color: var(--accent); border-color: var(--accent); }
.voice-btn.loading { color: var(--accent); border-color: var(--accent); pointer-events: none; animation: pulse 1s infinite; }
.voice-btn.playing { color: var(--green); border-color: var(--green); }
.voice-status { font-size: .65rem; color: var(--text-dim); transition: opacity .3s; }
.voice-status.active { color: var(--accent); }
.voice-status.error { color: var(--red); }
@keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.roast-history-toggle {
  font-family: var(--mono); font-size: .6rem; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-dim); background: none; border: 1px solid var(--border); border-radius: var(--radius);
  padding: 4px 12px; cursor: pointer; margin-top: 18px; transition: all .15s;
}
.roast-history-toggle:hover { background: var(--text); color: var(--bg); border-color: var(--text); }
.roast-history { margin-top: 24px; }
.roast-history.collapsed { display: none; }
.roast-history-item {
  padding: 18px 0; border-bottom: 1px solid #f0f0ec;
  opacity: 0; animation: fadeIn .4s ease forwards;
}
.roast-history-item:last-child { border-bottom: none; }
.roast-history-date { font-family: var(--mono); font-size: .6rem; color: var(--text-dim); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.history-play-btn { background: none; border: 1px solid var(--border); border-radius: 50%; width: 20px; height: 20px; font-size: .5rem; cursor: pointer; color: var(--text-dim); display: flex; align-items: center; justify-content: center; transition: all .15s; padding: 0; line-height: 1; }
.history-play-btn:hover { color: var(--accent); border-color: var(--accent); }
.roast-history-text { font-family: var(--serif); font-size: .9rem; line-height: 1.85; color: var(--text-mid); }

/* ── Section ── */
section { padding: 48px 0; border-bottom: 1px solid var(--border); }
section:last-of-type { border-bottom: none; }
.section-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 24px; padding-bottom: 10px; border-bottom: 2px solid var(--text);
}
.section-label { font-size: .68rem; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text); font-weight: 500; }
.section-meta { font-size: .65rem; color: var(--text-dim); }

/* ── Table rows ── */
.tbl-header {
  display: grid; font-size: .6rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-dim); padding: 0 0 8px; border-bottom: 1px solid var(--border);
}
.tbl-row {
  display: grid; padding: 10px 0; border-bottom: 1px solid #f0f0ec;
  font-size: .82rem; align-items: center; transition: background .1s;
}
.tbl-row:hover { background: #f5f5f2; }
.tbl-row:last-child { border-bottom: none; }

/* ── Governance ── */
.gov-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.gov-col {
  padding: 24px; background: var(--surface);
  border-radius: var(--radius); box-shadow: var(--shadow-sm);
  border: 1px solid var(--border); transition: box-shadow .2s;
}
.gov-col:hover { box-shadow: var(--shadow-md); }
.gov-dept-label { font-size: .58rem; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-dim); }
.gov-dept-name { font-family: var(--serif); font-size: 1.4rem; color: var(--text); margin: 6px 0 18px; }
.gov-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: .78rem; color: var(--text-mid); border-bottom: 1px solid #f0f0ec; }
.gov-row:last-child { border-bottom: none; }
.gov-val { color: var(--text); font-weight: 500; }
.gov-bar-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: .72rem; }
.gov-bar-name { min-width: 28px; color: var(--text-mid); }
.gov-bar { flex: 1; height: 4px; background: #f0f0ec; border-radius: 2px; overflow: hidden; }
.gov-bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .4s ease; }
.gov-note { font-size: .68rem; color: var(--text-dim); margin-top: 14px; padding-top: 10px; border-top: 1px solid #f0f0ec; }

/* ── Activity ── */
.activity-grid { display: grid; grid-template-columns: 1fr 260px; gap: 32px; }
@media (max-width: 860px) { .activity-grid { grid-template-columns: 1fr; } }

.heatmap { display: flex; gap: 2px; flex-wrap: wrap; }
.hm-cell { width: 12px; height: 12px; border-radius: 2px; cursor: pointer; transition: transform .1s; }
.hm-cell:hover { transform: scale(1.8); z-index: 2; }
.hm-0{background:#f0f0ec} .hm-1{background:#d4e4d0} .hm-2{background:#a0cca0} .hm-3{background:#5ea05e} .hm-4{background:var(--green)}
.hm-labels { display: flex; justify-content: space-between; font-size: .55rem; color: var(--text-dim); margin-top: 6px; }
.hm-tooltip { position:fixed; background:var(--text); color:var(--bg); border-radius:var(--radius); padding:6px 12px; font-size:.68rem; pointer-events:none; z-index:99; display:none; box-shadow: var(--shadow-md); }

.ev-search { display: flex; gap: 8px; margin: 16px 0 12px; }
.ev-search input, .ev-search select {
  font-family: var(--mono); font-size: .72rem; padding: 6px 12px;
  border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); outline: none;
  transition: border-color .15s;
}
.ev-search input { flex: 1; }
.ev-search input:focus, .ev-search select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,91,255,.08); }
.ev-row { display: grid; grid-template-columns: 100px 1fr; padding: 6px 0; font-size: .75rem; border-bottom: 1px solid #f4f4f0; align-items: center; }
.ev-row:last-child { border-bottom: none; }
.ev-date { color: var(--text-dim); font-size: .68rem; }
.ev-title { color: var(--text); }
.ev-src { font-size: .55rem; color: var(--text-dim); background: #f0f0ec; padding: 2px 6px; border-radius: 3px; margin-right: 6px; }
.ev-status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

/* Categories sidebar */
.cat-toggle { display: flex; gap: 4px; margin-bottom: 14px; }
.cat-btn {
  font-family: var(--mono); font-size: .6rem; padding: 3px 10px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: transparent; color: var(--text-dim); cursor: pointer; transition: all .15s;
}
.cat-btn:hover { border-color: var(--text-mid); color: var(--text-mid); }
.cat-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.cat-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: .72rem; color: var(--text-mid); border-bottom: 1px solid #f4f4f0; }
.cat-row:last-child { border-bottom: none; }
.cat-bar-wrap { flex: 1; margin: 0 10px; height: 3px; background: #f0f0ec; border-radius: 2px; align-self: center; }
.cat-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s ease; }

/* ── Insights ── */
.insight-daily {
  font-family: var(--serif); font-size: .95rem; line-height: 1.9;
  color: var(--text); max-width: 680px; margin-bottom: 24px;
}
.insight-daily .tags { font-family: var(--mono); font-size: .7rem; color: var(--accent); margin-top: 8px; letter-spacing: .3px; }
.insight-overview {
  font-family: var(--serif); font-size: .9rem; line-height: 2;
  color: var(--text-mid); max-width: 680px;
  padding: 18px 24px; margin-bottom: 32px;
  background: var(--surface); border-radius: var(--radius);
  box-shadow: var(--shadow-sm); border: 1px solid var(--border);
}
.sub-label { font-size: .62rem; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text); font-weight: 500; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.insight-columns { display: grid; grid-template-columns: 1fr 280px; gap: 48px; }
@media (max-width: 860px) { .insight-columns { grid-template-columns: 1fr; } }

.pattern-item {
  font-family: var(--serif); font-size: .88rem; color: var(--text-mid);
  padding: 10px 0; border-bottom: 1px solid #f4f4f0; line-height: 1.8;
}
.pattern-item:last-child { border-bottom: none; }

.rec-item { padding: 16px 0; border-bottom: 1px solid #f0f0ec; }
.rec-item:last-child { border-bottom: none; }
.rec-action { font-family: var(--serif); font-size: .9rem; color: var(--text); line-height: 1.7; }
.rec-reason { font-family: var(--serif); font-size: .8rem; color: var(--text-dim); margin-top: 6px; line-height: 1.65; font-style: italic; }
.rec-priority { font-family: var(--mono); font-size: .55rem; padding: 2px 8px; border-radius: 3px; margin-left: 8px; vertical-align: middle; letter-spacing: .5px; text-transform: uppercase; }
.rec-high { background: #fde8e8; color: var(--red); }
.rec-medium { background: #e6f4ea; color: var(--green); }
.rec-low { background: #f0f0ec; color: var(--text-dim); }
.collapsed { display: none; }

/* ── Debts ── */
.debt-item {
  padding: 14px 16px; margin-bottom: 8px;
  background: var(--surface); border-radius: var(--radius);
  box-shadow: var(--shadow-sm); border: 1px solid var(--border);
  border-left: 3px solid var(--text-dim);
  transition: box-shadow .2s;
}
.debt-item:hover { box-shadow: var(--shadow-md); }
.debt-item:last-child { margin-bottom: 0; }
.debt-item.debt-border-high { border-left-color: var(--red); }
.debt-item.debt-border-medium { border-left-color: var(--amber); }
.debt-item.debt-border-low { border-left-color: var(--green); }
.debt-head { display: flex; align-items: center; gap: 8px; }
.debt-severity { font-family: var(--mono); font-size: .55rem; padding: 2px 8px; border-radius: 3px; letter-spacing: .5px; text-transform: uppercase; }
.debt-sev-high { background: #fde8e8; color: var(--red); }
.debt-sev-medium { background: #fef3e0; color: var(--amber); }
.debt-sev-low { background: #f0f0ec; color: var(--text-dim); }
.debt-status { font-family: var(--mono); font-size: .55rem; padding: 2px 8px; border-radius: 3px; letter-spacing: .5px; text-transform: uppercase; }
.debt-status-open { background: #e8f0fe; color: #1a56db; }
.debt-status-resolved { background: #e6f4ea; color: var(--green); }
.debt-summary { font-family: var(--serif); font-size: .88rem; color: var(--text); line-height: 1.75; margin-top: 6px; }
.debt-meta { font-family: var(--mono); font-size: .65rem; color: var(--text-dim); margin-top: 6px; }
.debt-group { margin-bottom: 28px; }
.debt-group:last-child { margin-bottom: 0; }
.debt-proj-head { display: flex; justify-content: space-between; align-items: baseline; padding-bottom: 10px; margin-bottom: 8px; border-bottom: 1px solid var(--border); }
.debt-proj-name { font-family: var(--mono); font-size: .78rem; font-weight: 500; color: var(--text); }
.debt-proj-count { font-family: var(--mono); font-size: .6rem; color: var(--text-dim); }

/* ── Tasks ── */
.task-stats { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
.t-badge { font-size: .6rem; padding: 3px 10px; border-radius: 3px; letter-spacing: .3px; }
.t-done { background: #e6f4ea; color: var(--green); }
.t-failed { background: #fde8e8; color: var(--red); }
.t-running { background: #e8f0fe; color: #1a56db; animation: pulse 1.5s infinite; }
.t-pending { background: #f0f0ec; color: var(--text-dim); }
.t-awaiting { background: #fef3e0; color: var(--amber); }

.task-status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.task-dot-done { background: var(--green); }
.task-dot-failed { background: var(--red); }
.task-dot-running { background: #1a56db; animation: pulse 1.5s infinite; }
.task-dot-pending { background: var(--text-dim); }
.task-dot-awaiting { background: var(--amber); }

.task-row {
  display: grid; grid-template-columns: 80px 1fr 100px; padding: 12px 0; border-bottom: 1px solid #f0f0ec;
  align-items: start; cursor: pointer; transition: all .15s;
}
.task-row:hover { background: #f8f8f5; margin: 0 -12px; padding-left: 12px; padding-right: 12px; border-radius: var(--radius); }
.task-row:last-child { border-bottom: none; }
.task-id { font-size: .68rem; color: var(--text-dim); }
.task-action { font-size: .82rem; color: var(--text); }
.task-meta-line { font-size: .65rem; color: var(--text-dim); margin-top: 3px; }
.task-end { text-align: right; display: flex; align-items: center; justify-content: flex-end; gap: 4px; }
.task-detail { display:none; grid-column: 1/-1; margin-top:12px; padding:16px; background:#f8f8f5; border-radius:var(--radius); font-size:.75rem; border: 1px solid var(--border); }
.task-detail.open { display:block; }
.task-detail-row { display:flex; gap:8px; padding:4px 0; }
.task-detail-label { color:var(--text-dim); min-width:50px; }
.task-detail-val { color:var(--text-mid); }
.task-output { margin-top:10px; padding:10px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); color:var(--text-mid); white-space:pre-wrap; word-break:break-word; max-height:180px; overflow-y:auto; font-size:.7rem; }
.btn-approve { font-family:var(--mono); font-size:.6rem; padding:4px 12px; border:1px solid var(--accent); border-radius:var(--radius); background:transparent; color:var(--accent); cursor:pointer; transition: all .15s; }
.btn-approve:hover { background:var(--accent); color:#fff; }

/* ── Logs ── */
.logs-controls { display: flex; gap: 6px; }
.logs-btn {
  font-family:var(--mono); font-size:.6rem; padding:3px 10px;
  border:1px solid var(--border); border-radius:var(--radius);
  background:transparent; color:var(--text-dim); cursor:pointer; transition: all .15s;
}
.logs-btn:hover { background:var(--text); color:var(--bg); border-color: var(--text); }
.logs-body {
  max-height: 280px; overflow-y: auto; margin-top: 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px; box-shadow: var(--shadow-sm);
}
.logs-body.collapsed { display: none; }
.log-line { font-size: .65rem; padding: 3px 0; display: flex; gap: 8px; border-bottom: 1px solid #f8f8f5; }
.log-line:last-child { border-bottom: none; }
.log-ts { color: var(--text-dim); min-width: 62px; }
.log-src { color: var(--accent); min-width: 58px; }
.log-msg { color: var(--text-mid); flex: 1; word-break: break-word; }
.log-ERROR .log-msg { color: var(--red); }
.log-WARNING .log-msg { color: var(--amber); }

/* ── Modal ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:100; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:32px; width:min(600px,90vw); max-height:80vh; overflow-y:auto; box-shadow: var(--shadow-lg); }
.modal h3 { font-family:var(--serif); font-size:1.15rem; color:var(--text); margin-bottom:24px; }
.modal-field { margin:12px 0; }
.modal-label { font-size:.55rem; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); }
.modal-value { font-size:.8rem; color:var(--text-mid); margin-top:4px; line-height:1.7; }
.modal-actions { display:flex; gap:10px; margin-top:28px; justify-content:flex-end; }
.modal-actions button { font-family:var(--mono); font-size:.7rem; padding:7px 20px; border-radius:var(--radius); cursor:pointer; transition: all .15s; }
.btn-cancel { border:1px solid var(--border); background:var(--surface); color:var(--text-mid); }
.btn-cancel:hover { border-color: var(--text-mid); }
.btn-go { border:none; background:var(--accent); color:#fff; }
.btn-go:hover { opacity:.9; }

/* ── Responsive ── */
@media (max-width: 860px) {
  .gov-grid { grid-template-columns: 1fr; gap: 12px; }
  nav { padding: 0 16px; }
  .container { padding: 0 16px 60px; }
  .hero-title { font-size: 2rem; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <span class="nav-logo">Orchestrator</span>
    <div class="nav-links">
      <a class="nav-link active" href="#">Dashboard</a>
      <a class="nav-link" href="/pipeline">Pipeline</a>
      <a class="nav-link" href="/agents">Agents</a>
      <a class="nav-link api-link" href="/api-reference">API</a>
    </div>
  </div>
  <div class="nav-right">
    <span id="h-collect">--:--</span>
    <span id="h-analyze">--:--</span>
    <span><span class="status-dot" id="h-dot"></span><span id="h-ws">...</span></span>
  </div>
</nav>

<div class="container">

  <!-- Hero -->
  <div class="hero">
    <h1 class="hero-title">Daily Report <sup id="roast-date"></sup></h1>
    <div class="roast" id="roast">Observing...</div>
    <div class="roast-footer">
      <span class="roast-sig">-- Orchestrator</span>
      <button class="voice-btn" id="voice-btn" onclick="speakRoast()" title="Speak">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <span class="voice-status" id="voice-status"></span>
    </div>
    <audio id="voice-audio" style="display:none"></audio>
    <div id="roast-history" class="roast-history collapsed"></div>
    <button class="roast-history-toggle" id="roast-history-btn" onclick="toggleRoastHistory()" style="display:none">Past Entries</button>
  </div>

  <!-- 三省六部 -->
  <section>
    <div class="section-head">
      <span class="section-label">三省六部</span>

<script>
const $=s=>document.getElementById(s);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
let _events=[],_tasks=[],_stats={};

/* ── Roast ── */
function generateRoast(stats,events,tasks){
  const lines=[];
  const late=events.filter(e=>{const h=new Date(e.occurred_at).getHours();return h>=0&&h<5});
  if(late.length>5) lines.push(`Past week: ${late.length} late-night sessions. Your sleep schedule is less stable than my cron jobs.`);
  else if(late.length>0) lines.push(`${late.length} late-night activities -- you run longer hours than a 24/7 daemon.`);
  const src={};events.forEach(e=>{src[e.source]=(src[e.source]||0)+1});
  const sorted=Object.entries(src).sort((a,b)=>b[1]-a[1]);
  if(sorted.length>1){const[top,cnt]=sorted[0];const pct=Math.round(cnt/events.length*100);
    if(pct>40){const name=top.replace('browser_chrome_profile1','Chrome').replace('claude','Claude').replace('git','Git');
      lines.push(`${name} accounts for ${pct}% of all traces. The rest are extras.`);}}
  const done=tasks.filter(t=>t.status==='done').length;const failed=tasks.filter(t=>t.status==='failed').length;
  if(done+failed>0){const rate=Math.round(done/(done+failed)*100);
    if(rate<50)lines.push(`Governor success rate: ${rate}%. Barely functional.`);
    else if(rate<=70)lines.push(`Governor success rate: ${rate}%. Passing grade.`);
    else lines.push(`Governor success rate: ${rate}%. Starting to earn its keep.`);}
  const steam=(stats.bySource||[]).find(s=>s.source==='steam');
  if(steam)lines.push(`Steam library: ${steam.count} games, most collecting dust. Digital hoarding at its finest.`);
  if(stats.total>4000)lines.push(`${stats.total.toLocaleString()} traces observed. Privacy? You gave me the keys.`);
  const picked=lines.sort(()=>Math.random()-.5).slice(0,3);
  return picked.join(' ')||'Not enough data yet. Check back in a few days.';
}

/* ── Governance ── */
function renderGovernance(tasks){
  const auto=tasks.filter(t=>t.source==='auto').length;
  const manual=tasks.length-auto;
  const recent=tasks[0];
  $('gov-zhongshu').innerHTML=
    `<div class='gov-row'><span>Auto</span><span class='gov-val'>${auto}</span></div>`+
    `<div class='gov-row'><span>Manual</span><span class='gov-val'>${manual}</span></div>`+
    `<div class='gov-row'><span>Total</span><span class='gov-val'>${tasks.length}</span></div>`+
    (recent?`<div class='gov-note'>Latest: ${esc(recent.action||'')}</div>`:'');
  const scrutinized=tasks.filter(t=>t.scrutiny_note);
  const approved=scrutinized.filter(t=>(t.scrutiny_note||'').includes('准奏'));
  const rejected=tasks.filter(t=>t.status==='scrutiny_failed');
  const bypassed=tasks.filter(t=>(t.scrutiny_note||'').includes('默认放行'));
  $('gov-menxia').innerHTML=
    `<div class='gov-row'><span>Reviewed</span><span class='gov-val'>${scrutinized.length}</span></div>`+
    `<div class='gov-row'><span>Approved</span><span class='gov-val' style='color:var(--green)'>${approved.length}</span></div>`+
    `<div class='gov-row'><span>Rejected</span><span class='gov-val' style='color:var(--red)'>${rejected.length}</span></div>`+
    `<div class='gov-row'><span>Bypassed</span><span class='gov-val' style='color:var(--amber)'>${bypassed.length}</span></div>`+
    `<div class='gov-note'>Pass rate: ${scrutinized.length?Math.round(approved.length/scrutinized.length*100):'--'}%</div>`;
  const depts={engineering:{n:'工部',d:0,f:0},operations:{n:'户部',d:0,f:0},protocol:{n:'礼部',d:0,f:0},security:{n:'兵部',d:0,f:0},quality:{n:'刑部',d:0,f:0},personnel:{n:'吏部',d:0,f:0}};
  tasks.forEach(t=>{const k=(t.spec?.department)||'engineering';if(!depts[k])depts[k]={n:k,d:0,f:0};if(t.status==='done')depts[k].d++;if(t.status==='failed')depts[k].f++});
  const d=tasks.filter(t=>t.status==='done').length,f=tasks.filter(t=>t.status==='failed').length,r=tasks.filter(t=>t.status==='running').length;
  let h=`<div class='gov-row'><span>Done</span><span class='gov-val' style='color:var(--green)'>${d}</span></div>`+
    `<div class='gov-row'><span>Failed</span><span class='gov-val' style='color:var(--red)'>${f}</span></div>`+
    `<div class='gov-row'><span>Running</span><span class='gov-val'>${r}</span></div><div style='margin-top:14px'>`;
  for(const[,dept]of Object.entries(depts)){const t=dept.d+dept.f;const p=t?Math.round(dept.d/t*100):0;
    h+=`<div class='gov-bar-row'><span class='gov-bar-name'>${dept.n}</span><div class='gov-bar'><div class='gov-bar-fill' style='width:${p}%'></div></div><span style='font-size:.6rem;color:var(--text-dim)'>${dept.d}/${t}</span></div>`}
  h+='</div>';$('gov-shangshu').innerHTML=h;
  $('gov-meta').textContent=`${tasks.length} tasks | ${d} done | ${f} failed`;
}

/* ── Heatmap ── */
let _heatmap={};
function renderHeatmap(data){
  _heatmap={};data.forEach(d=>_heatmap[d.day]=Number(d.count));
  const today=new Date(),start=new Date(today);start.setDate(start.getDate()-59);
  const dow=start.getDay()||7;start.setDate(start.getDate()-(dow-1));
  let html='';const cur=new Date(start);
  while(cur<=today){const iso=cur.toISOString().slice(0,10);const cnt=_heatmap[iso]||0;
    const lv=cnt===0?0:cnt<=3?1:cnt<=9?2:cnt<=19?3:4;
    html+=`<div class='hm-cell hm-${lv}' data-day='${iso}' data-count='${cnt}' onmouseenter='showTip(this,event)' onmouseleave='hideTip()'></div>`;
    cur.setDate(cur.getDate()+1)}
  $('heatmap').innerHTML=html;
  $('hm-start').textContent=start.toISOString().slice(5,10);
  $('hm-end').textContent=today.toISOString().slice(5,10);
}
function showTip(el,ev){const t=$('tooltip');t.textContent=`${el.dataset.day} | ${el.dataset.count} events`;t.style.display='block';t.style.left=ev.pageX+12+'px';t.style.top=ev.pageY-30+'px'}
function hideTip(){$('tooltip').style.display='none'}

/* ── Events ── */
function buildSourceOptions(){const sel=$('ev-filter');const cur=sel.value;const srcs=[...new Set(_events.map(e=>e.source))].sort();sel.innerHTML="<option value=''>All</option>"+srcs.map(s=>`<option value='${esc(s)}'>${esc(s)}</option>`).join('');sel.value=cur}
function filterEvents(){
  const q=($('ev-search').value||'').toLowerCase();const src=$('ev-filter').value;
  const list=_events.filter(e=>{if(src&&e.source!==src)return false;if(q&&!(e.title||'').toLowerCase().includes(q))return false;return true}).slice(0,40);
  const el=$('events');if(!list.length){el.innerHTML="<div style='color:var(--text-dim);font-size:.75rem;padding:8px 0'>No events</div>";return}
  el.innerHTML=list.map(e=>{const ts=(e.occurred_at||'').replace('T',' ').slice(5,16);
    return`<div class='ev-row'><span class='ev-date'>${esc(ts)}</span><span><span class='ev-status-dot' style='background:var(--green)'></span><span class='ev-src'>${esc(e.source)}</span><span class='ev-title'>${esc((e.title||'').slice(0,55))}</span></span></div>`}).join('');
}

/* ── Categories ── */
async function loadCats(days,btn){
  if(btn){document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
  try{const rows=await fetch('/api/stats/categories?days='+days).then(r=>r.json());
    if(!rows.length){$('cat-list').innerHTML="<div style='color:var(--text-dim);font-size:.72rem'>No data</div>";return}
    const tot=rows.reduce((s,r)=>s+(r.total_min||0),0)||1;
    $('cat-list').innerHTML=rows.map(r=>{const p=Math.round((r.total_min||0)/tot*100);const h=((r.total_min||0)/60).toFixed(1);
      return`<div class='cat-row'><span>${esc(r.category)}</span><div class='cat-bar-wrap'><div class='cat-bar-fill' style='width:${p}%'></div></div><span style='color:var(--text-dim)'>${h}h</span></div>`}).join('')
  }catch{$('cat-list').innerHTML="<div style='color:var(--text-dim)'>Load failed</div>"}
}

/* ── Tasks ── */
const SZ={done:'Done',failed:'Failed',running:'Running',pending:'Pending',awaiting_approval:'Awaiting',scrutinizing:'Review',scrutiny_failed:'Rejected'};
const SC={done:'t-done',failed:'t-failed',running:'t-running',pending:'t-pending',awaiting_approval:'t-awaiting',scrutinizing:'t-awaiting',scrutiny_failed:'t-failed'};
const SD={done:'task-dot-done',failed:'task-dot-failed',running:'task-dot-running',pending:'task-dot-pending',awaiting_approval:'task-dot-awaiting',scrutinizing:'task-dot-awaiting',scrutiny_failed:'task-dot-failed'};
function renderTasks(tasks){
  const counts={};tasks.forEach(t=>{counts[t.status]=(counts[t.status]||0)+1});
  $('task-stats').innerHTML=Object.entries(counts).map(([s,c])=>`<span class='t-badge ${SC[s]||'t-pending'}'>${SZ[s]||s} ${c}</span>`).join('');
  if(!tasks.length){$('task-list').innerHTML="<div style='color:var(--text-dim);padding:12px 0'>No tasks</div>";return}
  $('task-list').innerHTML=tasks.map(t=>{
    const ts=(t.created_at||'').replace('T',' ').slice(5,16);
    const dotCls=SD[t.status]||'task-dot-pending';
    const statusLabel=SZ[t.status]||t.status;
    const dept=t.spec?.department?({engineering:'工部',operations:'户部',protocol:'礼部',security:'兵部',quality:'刑部',personnel:'吏部'}[t.spec.department]||''):'';
    const dur=t.started_at&&t.finished_at?Math.round((new Date(t.finished_at)-new Date(t.started_at))/1000)+'s':'';
    const approve=t.status==='awaiting_approval'?`<button class='btn-approve' onclick='event.stopPropagation();openModal(${t.id})'>Execute</button>`:'';
    let detail='';
    if(t.spec?.problem)detail+=`<div class='task-detail-row'><span class='task-detail-label'>Problem</span><span class='task-detail-val'>${esc(t.spec.problem)}</span></div>`;
    if(t.spec?.observation)detail+=`<div class='task-detail-row'><span class='task-detail-label'>Observed</span><span class='task-detail-val'>${esc(t.spec.observation)}</span></div>`;
    if(t.scrutiny_note)detail+=`<div class='task-detail-row'><span class='task-detail-label'>Review</span><span class='task-detail-val'>${esc(t.scrutiny_note)}</span></div>`;
    if(t.output)detail+=`<div class='task-output'>${esc((t.output||'').slice(0,500))}</div>`;
    return`<div class='task-row' onclick="this.querySelector('.task-detail')?.classList.toggle('open')">
      <span class='task-id'>#${t.id}</span>
      <div><div class='task-action'>${esc((t.action||'').slice(0,60))}</div><div class='task-meta-line'>${dept?dept+' | ':''}${esc(ts)}${dur?' | '+dur:''}</div></div>
      <span class='task-end'><span class='task-status-dot ${dotCls}'></span>${statusLabel}${approve}</span>
      <div class='task-detail'>${detail}</div>
    </div>`}).join('');
}

/* ── Modal ── */
let _mid=null;
function openModal(id){const t=_tasks.find(t=>t.id===id);if(!t)return;_mid=id;
  $('modal-title').textContent=t.action||'Task Details';
  let h='';[['Problem','problem'],['Behavior Chain','behavior_chain'],['Observation','observation'],['Expected','expected'],['Importance','importance'],['Plan','summary']].forEach(([l,k])=>{
    const v=t.spec?.[k];if(v)h+=`<div class='modal-field'><div class='modal-label'>${l}</div><div class='modal-value'>${esc(v)}</div></div>`});
  if(t.reason)h+=`<div class='modal-field'><div class='modal-label'>Reason</div><div class='modal-value'>${esc(t.reason)}</div></div>`;
  $('modal-body').innerHTML=h;$('modal').classList.add('open')}
function closeModal(){$('modal').classList.remove('open');_mid=null}
$('modal-go').onclick=async()=>{if(!_mid)return;$('modal-go').disabled=true;$('modal-go').textContent='Executing...';
  try{await fetch('/api/tasks/'+_mid+'/approve',{method:'POST'})}catch{}
  closeModal();$('modal-go').disabled=false;$('modal-go').textContent='Confirm';loadAll()};

/* ── Logs ── */
let _lo=true;
function toggleLogs(){_lo=!_lo;$('logs').classList.toggle('collapsed',!_lo)}
function clearLogs(){$('logs').innerHTML=''}
function appendLogs(logs){const el=$('logs');logs.forEach(l=>{const ts=(l.created_at||'').replace('T',' ').slice(11,19);
  el.innerHTML+=`<div class='log-line log-${esc(l.level)}'><span class='log-ts'>${esc(ts)}</span><span class='log-src'>${esc(l.source)}</span><span class='log-msg'>${esc(l.message)}</span></div>`});
  while(el.children.length>200)el.removeChild(el.firstChild);el.scrollTop=el.scrollHeight}
const evtSrc=new EventSource('/api/logs');
evtSrc.onmessage=e=>{try{const d=JSON.parse(e.data);appendLogs(d.logs||[])}catch{}};

/* ── Schedule ── */
async function updateSchedule(){try{const s=await fetch('/api/schedule-status').then(r=>r.json());
  if(s.next_collectors){const secs=Math.max(0,Math.round((new Date(s.next_collectors)-Date.now())/1000));$('h-collect').textContent=secs>0?`Collect ${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`:'Collecting'}
  if(s.next_analysis){const secs=Math.max(0,Math.round((new Date(s.next_analysis)-Date.now())/1000));$('h-analyze').textContent=secs>0?`Analyze ${Math.floor(secs/60)}m`:'Analyzing'}
}catch{}}
setInterval(updateSchedule,5000);updateSchedule();

/* ── WebSocket ── */
const ws=new WebSocket(`ws://${location.host}`);
ws.onopen=()=>{$('h-ws').textContent='Online';$('h-dot').classList.remove('off')};
ws.onclose=()=>{$('h-ws').textContent='Offline';$('h-dot').classList.add('off')};
ws.onmessage=e=>{try{const d=JSON.parse(e.data);
  if(d.type==='task_update')loadAll();
  if(d.type==='soul_voice'&&d.audio){stopTtsTimer();voiceBtn.classList.remove('loading');setVoiceStatus('');const blob=new Blob([Uint8Array.from(atob(d.audio),c=>c.charCodeAt(0))],{type:d.mime||'audio/mpeg'});const blobUrl=URL.createObjectURL(blob);voiceAudio.src=blobUrl;voiceAudio.currentTime=0;voiceAudio.oncanplay=()=>{voiceAudio.oncanplay=null;voiceAudio.play();voiceBtn.classList.add('playing')};voiceAudio.onended=()=>{voiceBtn.classList.remove('playing');URL.revokeObjectURL(blobUrl)}}
  if(d.type==='tts_status'&&(d.status==='compiling'||d.status==='generating')){_ttsPhase=d.status}
  if(d.type==='tts_status'&&d.status==='error'){stopTtsTimer();voiceBtn.classList.remove('loading');setVoiceStatus('TTS failed: '+(d.error||'unknown'),'error');setTimeout(()=>setVoiceStatus(''),5000)}
}catch{}};

/* ── Insights render ── */
function renderInsightsSection(insights) {
  // Overview
  const ov = $('insights-overview');
  if (insights.overview) {
    ov.textContent = insights.overview;
  } else {
    ov.innerHTML = "<span style='color:var(--text-dim)'>Awaiting first insight generation</span>";
  }
  // Patterns
  const pa = $('insights-patterns');
  if (Array.isArray(insights.patterns) && insights.patterns.length) {
    pa.innerHTML = insights.patterns.map(p => `<div class='pattern-item'>${esc(p)}</div>`).join('');
  } else {
    pa.innerHTML = "<div style='color:var(--text-dim);font-size:.8rem'>None</div>";
  }
  // Recommendations
  const re = $('insights-recs');
  if (Array.isArray(insights.recommendations) && insights.recommendations.length) {
    re.innerHTML = insights.recommendations.map(r =>
      `<div class='rec-item'><div class='rec-action'>${esc(r.action||'')}<span class='rec-priority rec-${r.priority||'low'}'>${r.priority||''}</span></div><div class='rec-reason'>${esc(r.reason||'')}</div></div>`
    ).join('');
  } else {
    re.innerHTML = "<div style='color:var(--text-dim);font-size:.8rem'>None</div>";
  }
}

function renderDailySummary(summary) {
  const el = $('daily-summary');
  const latest = summary.summaries?.[0];
  if (latest) {
    try {
      const d = JSON.parse(latest.summary || '{}');
      let html = '<p>' + esc(d.summary || '') + '</p>';
      if (d.top_topics?.length) html += '<div class="tags">' + d.top_topics.map(t => '#' + esc(t)).join('  ') + '</div>';
      el.innerHTML = html || '<span style="color:var(--text-dim)">Awaiting first analysis</span>';
    } catch { el.innerHTML = '<p>' + esc(latest.summary || '') + '</p>'; }
  } else {
    el.innerHTML = '<span style="color:var(--text-dim)">Awaiting first analysis</span>';
  }
}

/* ── Debts ── */
function renderDebts(debts){
  const el=$('debt-list');
  const open=debts.filter(d=>(d.status||'open')==='open').length;
  $('debt-count').textContent=debts.length?`${open} open / ${debts.length} total`:'';
  if(!debts.length){el.innerHTML="<div style='color:var(--text-dim);font-size:.8rem;padding:8px 0'>No debts</div>";return}
  const groups={};debts.forEach(d=>{const p=d.project||'Uncategorized';if(!groups[p])groups[p]=[];groups[p].push(d)});
  let html='';
  for(const[proj,items]of Object.entries(groups)){
    const pOpen=items.filter(d=>(d.status||'open')==='open').length;
    html+=`<div class='debt-group'><div class='debt-proj-head'><span class='debt-proj-name'>${esc(proj)}</span><span class='debt-proj-count'>${pOpen} open</span></div>`;
    html+=items.map(d=>{
      const sevCls={'high':'debt-sev-high','medium':'debt-sev-medium','low':'debt-sev-low'}[d.severity]||'debt-sev-low';
      const borderCls={'high':'debt-border-high','medium':'debt-border-medium','low':'debt-border-low'}[d.severity]||'debt-border-low';
      const sevLabel={'high':'HIGH','medium':'MED','low':'LOW'}[d.severity]||d.severity;
      const st=(d.status||'open');
      const stCls=st==='resolved'?'debt-status-resolved':'debt-status-open';
      const stLabel=st==='resolved'?'Resolved':'Open';
      const ts=(d.created_at||'').replace('T',' ').slice(0,16);
      return`<div class='debt-item ${borderCls}'>
        <div class='debt-head'><span class='debt-severity ${sevCls}'>${sevLabel}</span><span class='debt-status ${stCls}'>${stLabel}</span></div>
        <div class='debt-summary'>${esc(d.summary||'')}</div>
        <div class='debt-meta'>${esc(ts)}</div>
      </div>`}).join('');
    html+='</div>';
  }
  el.innerHTML=html;
}

/* ── Main ── */
async function loadAll(){
  const[stats,events,tasks,heatmap,summary,insights,debts,profile]=await Promise.all([
    fetch('/api/stats').then(r=>r.json()).catch(()=>({})),
    fetch('/api/events?days=7').then(r=>r.json()).catch(()=>[]),
    fetch('/api/tasks').then(r=>r.json()).catch(()=>[]),
    fetch('/api/events/heatmap?days=60').then(r=>r.json()).catch(()=>[]),
    fetch('/api/summary').then(r=>r.json()).catch(()=>({})),
    fetch('/api/insights').then(r=>r.json()).catch(()=>({})),
    fetch('/api/debts').then(r=>r.json()).catch(()=>[]),
    fetch('/api/profile-analysis').then(r=>r.json()).catch(()=>({})),
  ]);
  _stats=stats;_events=events;_tasks=tasks;
  // Hero: prefer LLM commentary, fallback to template
  const llmText=profile.commentary||profile.daily_note||'';
  $('roast').textContent=llmText||generateRoast(stats,events,tasks);
  $('roast-date').textContent=`(${new Date().toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'})})`;
  $('event-count').textContent=`${(stats.total||0).toLocaleString()} events`;
  renderDailySummary(summary);
  renderInsightsSection(insights);
  renderDebts(debts);
  renderGovernance(tasks);renderHeatmap(heatmap);buildSourceOptions();filterEvents();
  loadCats(1,document.querySelector('.cat-btn.active'));renderTasks(tasks);
  loadRoastHistory();
}
loadAll();setInterval(loadAll,60000);

let _historyItems=[];
async function loadRoastHistory(){
  try{
    const items=await fetch('/api/profile-analysis/history').then(r=>r.json());
    const past=items.slice(1);
    if(!past.length){$('roast-history-btn').style.display='none';return}
    $('roast-history-btn').style.display='';
    _historyItems=past;
    $('roast-history').innerHTML=past.map((r,i)=>{
      const ts=(r.date||'').replace('T',' ').slice(0,16);
      const text=r.commentary||r.daily_note;
      return`<div class='roast-history-item' style='animation-delay:${i*0.08}s'><div class='roast-history-date'>${esc(ts)}<button class='history-play-btn' onclick='playHistory(${i})' title='Play'>&#9654;</button></div><div class='roast-history-text'>${esc(text)}</div></div>`
    }).join('');
  }catch{}
}
function playHistory(idx){
  const item=_historyItems[idx];
  if(!item)return;
  const text=item.commentary||item.daily_note;
  const voice=item.voice||null;
  _requestTTS(text, voice);
}
function _requestTTS(text, reference_id){
  voiceBtn.classList.add('loading');
  voiceBtn.classList.remove('playing');
  startTtsTimer();
  const body=reference_id?{text,reference_id}:{text};
  fetch('/api/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).catch(()=>{
    stopTtsTimer();voiceBtn.classList.remove('loading');setVoiceStatus('Voice service unavailable','error');setTimeout(()=>setVoiceStatus(''),4000);
  });
}
function toggleRoastHistory(){
  const el=$('roast-history');
  const btn=$('roast-history-btn');
  el.classList.toggle('collapsed');
  btn.textContent=el.classList.contains('collapsed')?'Past Entries':'Collapse';
}

// ── SOUL Voice ──
const voiceBtn = document.getElementById('voice-btn');
const voiceAudio = document.getElementById('voice-audio');
const voiceStatus = document.getElementById('voice-status');
let _ttsTimer = null;

function setVoiceStatus(text, cls) {
  voiceStatus.textContent = text;
  voiceStatus.className = 'voice-status' + (cls ? ' ' + cls : '');
}

let _ttsPhase = 'generating';

function startTtsTimer() {
  let sec = 0;
  _updateTtsLabel(sec);
  _ttsTimer = setInterval(() => { sec++; _updateTtsLabel(sec); }, 1000);
}

function _updateTtsLabel(sec) {
  if (_ttsPhase === 'compiling') {
    setVoiceStatus(`First run, compiling model... ${sec}s (~60s)`, 'active');
  } else {
    setVoiceStatus(`Generating voice... ${sec}s`, 'active');
  }
}

function stopTtsTimer() {
  if (_ttsTimer) { clearInterval(_ttsTimer); _ttsTimer = null; }
}

function speakRoast() {
  // If audio is playing, pause it
  if (!voiceAudio.paused && voiceAudio.src) {
    voiceAudio.pause();
    voiceBtn.classList.remove('playing');
    return;
  }
  // If audio is paused (has src and currentTime > 0), resume
  if (voiceAudio.paused && voiceAudio.src && voiceAudio.currentTime > 0) {
    voiceAudio.play();
    voiceBtn.classList.add('playing');
    return;
  }
  // Otherwise generate new
  const roastEl = document.getElementById('roast');
  const text = roastEl?.textContent?.trim();
  if (!text || text === 'Observing...') return;
  _requestTTS(text, null);
}
</script>
