<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orchestrator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fafaf8; --surface: #fff; --border: #e8e8e4;
  --text: #1a1a1a; --text-mid: #6b6b68; --text-dim: #a0a09c;
  --accent: #635bff; --green: #0a7d54; --red: #c0392b; --amber: #b8860b;
  --mono: 'IBM Plex Mono', 'JetBrains Mono', monospace;
  --serif: 'Noto Serif SC', 'Georgia', serif;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 32px rgba(0,0,0,.08), 0 4px 8px rgba(0,0,0,.04);
  --radius: 6px;
}
html { font-size: 15px; scroll-behavior: smooth; }
body { font-family: var(--mono); background: var(--bg); color: var(--text); line-height: 1.7; -webkit-font-smoothing: antialiased; }
::selection { background: #635bff22; }

/* ── Nav ── */
nav {
  position: sticky; top: 0; z-index: 50; background: rgba(250,250,248,.92);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 32px; height: 48px; font-size: .75rem;
}
.nav-left { display: flex; align-items: center; gap: 20px; }
.nav-logo { font-family: var(--serif); font-size: 1.05rem; color: var(--text); font-weight: 500; letter-spacing: -.02em; }
.nav-links { display: flex; gap: 4px; }
.nav-link {
  padding: 4px 12px; border-radius: var(--radius);
  color: var(--text-mid); text-decoration: none; font-size: .7rem;
  letter-spacing: .5px; text-transform: uppercase; transition: all .15s;
  border: none; background: transparent;
}
.nav-link:hover { background: #f0f0ec; color: var(--text); }
.nav-link.active { background: var(--text); color: var(--bg); }
.nav-link.api-link { color: var(--text-dim); font-size: .65rem; margin-left: 4px; }
.nav-link.api-link:hover { color: var(--accent); background: transparent; }
.nav-right { display: flex; align-items: center; gap: 16px; font-size: .7rem; color: var(--text-dim); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 4px; }
.status-dot.off { background: var(--red); }

/* ── Layout ── */
.container { max-width: 1200px; margin: 0 auto; padding: 0 32px 32px; }

/* ── Hero ── */
.hero { padding: 56px 0 48px; border-bottom: 1px solid var(--border); }
.hero-title {
  font-family: var(--serif); font-size: 2.8rem; line-height: 1.2;
  color: var(--text); margin-bottom: 6px; font-weight: 400; letter-spacing: -.02em;
}
.hero-title sup { font-size: .85rem; color: var(--text-dim); font-family: var(--mono); vertical-align: super; }
.roast {
  font-family: var(--serif); font-size: 1.2rem; line-height: 1.9;
  color: var(--text-mid); font-style: italic; max-width: 680px; margin-top: 24px;
  opacity: 0; animation: fadeIn .6s ease .15s forwards;
}
.roast-footer { margin-top: 18px; display: flex; align-items: center; gap: 12px; }
.roast-sig { font-size: .6rem; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-dim); }
.voice-btn {
  background: none; border: 1px solid var(--border); border-radius: 50%; width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-dim);
  transition: all .2s;
}
.voice-btn:hover { color: var(--accent); border-color: var(--accent); }
.voice-btn.loading { color: var(--accent); border-color: var(--accent); pointer-events: none; animation: pulse 1s infinite; }
.voice-btn.playing { color: var(--green); border-color: var(--green); }
.voice-status { font-size: .65rem; color: var(--text-dim); transition: opacity .3s; }
.voice-status.active { color: var(--accent); }
.voice-status.error { color: var(--red); }
@keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ── System section (reuses gov-entry pattern) ── */
.sys-agents { margin-top: 10px; }

.roast-history-toggle {
  font-family: var(--mono); font-size: .6rem; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-dim); background: none; border: 1px solid var(--border); border-radius: var(--radius);
  padding: 4px 12px; cursor: pointer; margin-top: 18px; transition: all .15s;
}
.roast-history-toggle:hover { background: var(--text); color: var(--bg); border-color: var(--text); }
.roast-history { margin-top: 24px; }
.roast-history.collapsed { display: none; }
.roast-history-item {
  padding: 18px 0; border-bottom: 1px solid #f0f0ec;
  opacity: 0; animation: fadeIn .4s ease forwards;
}
.roast-history-item:last-child { border-bottom: none; }
.roast-history-date { font-family: var(--mono); font-size: .6rem; color: var(--text-dim); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.history-play-btn { background: none; border: 1px solid var(--border); border-radius: 50%; width: 20px; height: 20px; font-size: .5rem; cursor: pointer; color: var(--text-dim); display: flex; align-items: center; justify-content: center; transition: all .15s; padding: 0; line-height: 1; }
.history-play-btn:hover { color: var(--accent); border-color: var(--accent); }
.roast-history-text { font-family: var(--serif); font-size: .9rem; line-height: 1.85; color: var(--text-mid); }

/* ── Section ── */
section { padding: 48px 0; border-bottom: 1px solid var(--border); }
section:last-of-type { border-bottom: none; }
.section-head {
  display: flex; align-items: baseline; gap: 12px;
  margin-bottom: 24px;
}
.section-label { font-size: .68rem; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text); font-weight: 500; }
.section-meta { font-size: .65rem; color: var(--text-dim); }

/* ── Table rows ── */
.tbl-header {
  display: grid; font-size: .6rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-dim); padding: 0 0 8px; border-bottom: 1px solid var(--border);
}
.tbl-row {
  display: grid; padding: 10px 0; border-bottom: 1px solid #f0f0ec;
  font-size: .82rem; align-items: center; transition: background .1s;
}
.tbl-row:hover { background: #f5f5f2; }
.tbl-row:last-child { border-bottom: none; }

/* ── Governance ── */
.gov-stats { display: flex; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; }
.gov-stat { display: flex; align-items: baseline; gap: 6px; }
.gov-stat-num { font-size: 1.8rem; font-weight: 400; font-family: var(--serif); color: var(--text); line-height: 1; }
.gov-stat-label { font-size: .65rem; color: var(--text-dim); letter-spacing: .5px; }
.gov-stat-num.green { color: var(--green); }
.gov-stat-num.red { color: var(--red); }
.gov-stat-num.blue { color: #1a56db; }

.gov-layout { display: flex; flex-direction: column; gap: 8px; }

.gov-block {
  padding: 14px 18px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
}
.gov-block-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
.gov-block-title { font-family: var(--serif); font-size: .95rem; color: var(--text); }
.gov-block-count { font-size: .62rem; color: var(--text-dim); }

/* 省内条目 */
.gov-entry { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: .72rem; }
.gov-entry-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.gov-entry-dot.approved { background: var(--green); }
.gov-entry-dot.rejected { background: var(--red); }
.gov-entry-dot.auto { background: var(--accent); }
.gov-entry-dot.manual { background: var(--amber); }
.gov-entry-text { color: var(--text-mid); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gov-entry-tag { font-size: .58rem; color: var(--text-dim); flex-shrink: 0; }

/* 六部 2x3 grid */
.dept-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 20px; }
.dept-grid-cell { padding: 6px 0; border-bottom: 1px solid #f4f4f0; }
.dept-grid-cell:nth-last-child(-n+2) { border-bottom: none; }
.dept-grid-top { display: flex; align-items: center; gap: 6px; }
.dept-grid-name { font-family: var(--serif); font-size: .78rem; font-weight: 500; color: var(--text); min-width: 28px; }
.dept-grid-bar { flex: 1; height: 3px; background: #f0f0ec; border-radius: 2px; overflow: hidden; position: relative; }
.dept-grid-bar-done { height: 100%; background: var(--green); border-radius: 2px; position: absolute; left: 0; top: 0; transition: width .4s; }
.dept-grid-bar-fail { height: 100%; background: var(--red); border-radius: 2px; position: absolute; top: 0; transition: width .4s, left .4s; }
.dept-grid-stat { font-size: .6rem; color: var(--text-dim); white-space: nowrap; }
.dept-grid-stat .rate { color: var(--green); font-weight: 500; }
.dept-grid-last { font-size: .6rem; color: var(--text-dim); margin-top: 3px; display: flex; justify-content: space-between; }
.dept-grid-last-action { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.dept-grid-last-action.s-done { color: var(--green); }
.dept-grid-last-action.s-failed { color: var(--red); }
.dept-grid-last-time { flex-shrink: 0; margin-left: 6px; }

/* 政策建议 */
.policy-adopt-btn {
  font-family: var(--mono); font-size: .6rem; letter-spacing: .5px;
  color: var(--accent); background: none; border: 1px solid var(--accent);
  border-radius: var(--radius); padding: 3px 10px; cursor: pointer;
  transition: all .15s; flex-shrink: 0; white-space: nowrap; margin-top: 2px;
}
.policy-adopt-btn:hover { background: var(--accent); color: #fff; }
.policy-adopt-btn:disabled { opacity: .4; pointer-events: none; }
.policy-history-toggle {
  font-family: var(--mono); font-size: .6rem; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-dim); background: none; border: 1px solid var(--border); border-radius: var(--radius);
  padding: 4px 12px; cursor: pointer; transition: all .15s;
}
.policy-history-toggle:hover { background: var(--text); color: var(--bg); border-color: var(--text); }
.policy-history-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 0;
  border-bottom: 1px solid #f4f4f0; font-size: .72rem;
}
.policy-history-item:last-child { border-bottom: none; }
.policy-h-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; background: var(--green); }
.policy-h-dept { font-family: var(--serif); font-size: .7rem; color: var(--text-mid); }
.policy-h-detail { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.policy-h-time { font-size: .6rem; color: var(--text-dim); flex-shrink: 0; }

/* 最近任务（全宽，三省下方） */
.gov-sub-label { font-size: .6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; }
.gov-recent-block {
  padding: 14px 18px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
}
.gov-task-list { display: flex; flex-direction: column; }
.gov-task-item {
  display: grid; grid-template-columns: 5px 32px 1fr auto auto;
  align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #f4f4f0; font-size: .75rem;
}
.gov-task-item:last-child { border-bottom: none; }
.gov-task-dot { width: 5px; height: 5px; border-radius: 50%; }
.gov-task-dot.done { background: var(--green); }
.gov-task-dot.failed { background: var(--red); }
.gov-task-dot.running { background: #1a56db; animation: pulse 1.5s infinite; }
.gov-task-dot.pending { background: var(--text-dim); }
.gov-task-dot.awaiting { background: var(--amber); }
.gov-task-dot.scrutiny_failed { background: var(--red); opacity: .5; }
.gov-task-dept { font-family: var(--serif); font-size: .72rem; color: var(--text-mid); text-align: center; }
.gov-task-action { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.gov-task-meta { font-size: .6rem; color: var(--text-dim); display: flex; gap: 6px; white-space: nowrap; }
.gov-task-time { font-size: .62rem; color: var(--text-dim); text-align: right; white-space: nowrap; }

/* ── Activity ── */
.activity-grid { display: grid; grid-template-columns: 1fr 260px; gap: 32px; }
@media (max-width: 860px) { .activity-grid { grid-template-columns: 1fr; } }

.heatmap { display: flex; gap: 2px; flex-wrap: wrap; }
.hm-cell { width: 12px; height: 12px; border-radius: 2px; cursor: pointer; transition: transform .1s; }
.hm-cell:hover { transform: scale(1.8); z-index: 2; }
.hm-0{background:#f0f0ec} .hm-1{background:#d4e4d0} .hm-2{background:#a0cca0} .hm-3{background:#5ea05e} .hm-4{background:var(--green)}
.hm-labels { display: flex; justify-content: space-between; font-size: .55rem; color: var(--text-dim); margin-top: 6px; }
.hm-tooltip { position:fixed; background:var(--text); color:var(--bg); border-radius:var(--radius); padding:6px 12px; font-size:.68rem; pointer-events:none; z-index:99; display:none; box-shadow: var(--shadow-md); }

/* ── Burst Sessions ── */
.burst-card { background: var(--surface); border: 1px solid #f5c6cb; border-left: 3px solid var(--red); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 8px; }
.burst-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.burst-icon { font-size: .85rem; }
.burst-project { font-weight: 500; font-size: .78rem; }
.burst-time { font-size: .62rem; color: var(--text-dim); margin-left: auto; }
.burst-stats { display: flex; gap: 16px; font-size: .68rem; color: var(--text-mid); }
.burst-stat b { color: var(--text); font-weight: 500; }
.burst-none { font-size: .72rem; color: var(--text-dim); padding: 8px 0; }

.ev-search { display: flex; gap: 8px; margin: 16px 0 12px; }
.ev-search input, .ev-search select {
  font-family: var(--mono); font-size: .72rem; padding: 6px 12px;
  border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); outline: none;
  transition: border-color .15s;
}
.ev-search input { flex: 1; }
.ev-search input:focus, .ev-search select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,91,255,.08); }
.ev-row { display: grid; grid-template-columns: 100px 1fr; padding: 6px 0; font-size: .75rem; border-bottom: 1px solid #f4f4f0; align-items: center; }
.ev-row:last-child { border-bottom: none; }
.ev-date { color: var(--text-dim); font-size: .68rem; }
.ev-title { color: var(--text); }
.ev-src { font-size: .55rem; color: var(--text-dim); background: #f0f0ec; padding: 2px 6px; border-radius: 3px; margin-right: 6px; }
.ev-status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

/* Categories sidebar */
.cat-toggle { display: flex; gap: 4px; margin-bottom: 14px; }
.cat-btn {
  font-family: var(--mono); font-size: .6rem; padding: 3px 10px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: transparent; color: var(--text-dim); cursor: pointer; transition: all .15s;
}
.cat-btn:hover { border-color: var(--text-mid); color: var(--text-mid); }
.cat-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.cat-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: .72rem; color: var(--text-mid); border-bottom: 1px solid #f4f4f0; }
.cat-row:last-child { border-bottom: none; }
.cat-bar-wrap { flex: 1; margin: 0 10px; height: 3px; background: #f0f0ec; border-radius: 2px; align-self: center; }
.cat-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s ease; }

/* ── Insights ── */
.insight-daily {
  font-family: var(--serif); font-size: .95rem; line-height: 1.9;
  color: var(--text); margin-bottom: 24px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
}
.insight-daily .daily-headline {
  font-size: .95rem; line-height: 1.8; margin-bottom: 14px;
}
.insight-daily .daily-topics {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
}
.insight-daily .daily-topic-tag {
  font-family: var(--mono); font-size: .68rem; color: var(--accent);
  background: color-mix(in srgb, var(--accent) 8%, transparent);
  padding: 3px 10px; border-radius: 3px; letter-spacing: .3px;
}
.insight-daily .daily-time-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px 16px;
  margin-bottom: 14px;
}
.insight-daily .daily-time-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: .75rem; color: var(--text-mid); padding: 4px 0;
  border-bottom: 1px solid #f4f4f0;
}
.insight-daily .daily-time-row .time-label { flex: 1; }
.insight-daily .daily-time-row .time-bar-wrap {
  flex: 1; height: 3px; background: #f0f0ec; border-radius: 2px; margin: 0 8px;
}
.insight-daily .daily-time-row .time-bar-fill {
  height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s ease;
}
.insight-daily .daily-time-row .time-val {
  font-family: var(--mono); font-size: .7rem; min-width: 36px; text-align: right;
}
.daily-behavior {
  font-family: var(--serif); font-size: .9rem; line-height: 2;
  color: var(--text-mid); margin-bottom: 20px;
}
.insight-daily .tags { font-family: var(--mono); font-size: .7rem; color: var(--accent); margin-top: 8px; letter-spacing: .3px; }
.insight-overview {
  font-family: var(--serif); font-size: .9rem; line-height: 2;
  color: var(--text-mid);
  padding: 0; margin-bottom: 32px;
}
.sub-label { font-size: .62rem; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text); font-weight: 500; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.insight-columns { display: grid; grid-template-columns: 1fr 320px; gap: 48px; }
@media (max-width: 860px) { .insight-columns { grid-template-columns: 1fr; } }

.pattern-item {
  font-family: var(--serif); font-size: .88rem; color: var(--text-mid);
  padding: 10px 0; border-bottom: 1px solid #f4f4f0; line-height: 1.8;
}
.pattern-item:last-child { border-bottom: none; }

.rec-item {
  padding: 14px 18px; margin-bottom: 8px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
}
.rec-item:last-child { margin-bottom: 0; }
.rec-head { display: flex; align-items: flex-start; gap: 10px; }
.rec-action { font-family: var(--serif); font-size: .9rem; color: var(--text); line-height: 1.7; flex: 1; }
.rec-reason { font-family: var(--serif); font-size: .8rem; color: var(--text-dim); margin-top: 6px; line-height: 1.65; font-style: italic; }
.policy-dept-tag { font-family: var(--mono); font-size: .55rem; padding: 1px 6px; border-radius: 3px; margin-left: 6px; background: #f0f0ec; color: var(--text-mid); vertical-align: middle; }
.rec-priority { font-family: var(--mono); font-size: .55rem; padding: 2px 8px; border-radius: 3px; margin-left: 8px; vertical-align: middle; letter-spacing: .5px; text-transform: uppercase; }
.rec-high { background: #fde8e8; color: var(--red); }
.rec-medium { background: #e6f4ea; color: var(--green); }
.rec-low { background: #f0f0ec; color: var(--text-dim); }
.collapsed { display: none; }

/* ── Debts ── */
.debt-group {
  margin-bottom: 8px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0 14px;
}
.debt-proj-row {
  display: flex; align-items: center; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid #f0f0ec; cursor: pointer; transition: background .1s;
}
.debt-proj-row:hover { background: #f8f8f5; border-radius: 3px; }
.debt-proj-arrow { font-size: .6rem; color: var(--text-dim); transition: transform .2s; width: 12px; text-align: center; }
.debt-proj-arrow.open { transform: rotate(90deg); }
.debt-proj-name { font-family: var(--mono); font-size: .75rem; font-weight: 500; color: var(--text); flex: 1; }
.debt-proj-badges { display: flex; gap: 4px; align-items: center; }
.debt-proj-sev { font-family: var(--mono); font-size: .52rem; padding: 1px 6px; border-radius: 3px; letter-spacing: .3px; }
.debt-proj-sev.high { background: #fde8e8; color: var(--red); }
.debt-proj-sev.med { background: #fef3e0; color: var(--amber); }
.debt-proj-sev.low { background: #f0f0ec; color: var(--text-dim); }
.debt-proj-count { font-family: var(--mono); font-size: .6rem; color: var(--text-dim); }

.debt-detail { display: none; padding: 0 0 8px 22px; }
.debt-detail.open { display: block; }
.debt-item { padding: 6px 0; border-bottom: 1px solid #f8f8f5; }
.debt-item:last-child { border-bottom: none; }

/* ── Tasks ── */

<script>
/* ── Theme toggle (Pretext magazine dark) ── */
function toggleTheme(){
  const html=document.documentElement;
  const cur=html.getAttribute('data-theme');
  if(cur==='magazine'){html.removeAttribute('data-theme');localStorage.removeItem('orch-theme');$('theme-toggle').textContent='杂志'}
  else{html.setAttribute('data-theme','magazine');localStorage.setItem('orch-theme','magazine');$('theme-toggle').textContent='日光'}
}
(function(){const t=localStorage.getItem('orch-theme');if(t){document.documentElement.setAttribute('data-theme',t);document.addEventListener('DOMContentLoaded',()=>{const b=document.getElementById('theme-toggle');if(b)b.textContent='日光'})}})();

const $=s=>document.getElementById(s);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function relTime(ts){if(!ts)return'--';const d=Date.now()-new Date(ts).getTime();if(d<0)return'now';const s=Math.floor(d/1000);if(s<60)return s+'s ago';const m=Math.floor(s/60);if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago'}
let _events=[],_tasks=[],_stats={};

/* ── Roast ── */
function generateRoast(stats,events,tasks){
  const lines=[];
  const late=events.filter(e=>{const h=new Date(e.occurred_at).getHours();return h>=0&&h<5});
  if(late.length>5) lines.push(`Past week: ${late.length} late-night sessions. Your sleep schedule is less stable than my cron jobs.`);
  else if(late.length>0) lines.push(`${late.length} late-night activities -- you run longer hours than a 24/7 daemon.`);
  const src={};events.forEach(e=>{src[e.source]=(src[e.source]||0)+1});
  const sorted=Object.entries(src).sort((a,b)=>b[1]-a[1]);
  if(sorted.length>1){const[top,cnt]=sorted[0];const pct=Math.round(cnt/events.length*100);
    if(pct>40){const name=top.replace('browser_chrome_profile1','Chrome').replace('claude','Claude').replace('git','Git');
      lines.push(`${name} accounts for ${pct}% of all traces. The rest are extras.`);}}
  const done=tasks.filter(t=>t.status==='done').length;const failed=tasks.filter(t=>t.status==='failed').length;
  if(done+failed>0){const rate=Math.round(done/(done+failed)*100);
    if(rate<50)lines.push(`Governor success rate: ${rate}%. Barely functional.`);
    else if(rate<=70)lines.push(`Governor success rate: ${rate}%. Passing grade.`);
    else lines.push(`Governor success rate: ${rate}%. Starting to earn its keep.`);}
  const steam=(stats.bySource||[]).find(s=>s.source==='steam');
  if(steam)lines.push(`Steam library: ${steam.count} games, most collecting dust. Digital hoarding at its finest.`);
  if(stats.total>4000)lines.push(`${stats.total.toLocaleString()} traces observed. Privacy? You gave me the keys.`);
  const picked=lines.sort(()=>Math.random()-.5).slice(0,3);
  return picked.join(' ')||'Not enough data yet. Check back in a few days.';
}

/* ── Governance ── */
function renderGovernance(tasks){
  const deptMap={engineering:'工部',operations:'户部',protocol:'礼部',security:'兵部',quality:'刑部',personnel:'吏部'};
  const d=tasks.filter(t=>t.status==='done').length;
  const f=tasks.filter(t=>t.status==='failed').length;
  const r=tasks.filter(t=>t.status==='running').length;
  const scrutinized=tasks.filter(t=>t.scrutiny_note);
  const approvedList=scrutinized.filter(t=>(t.scrutiny_note||'').includes('准奏'));
  const passRate=scrutinized.length?Math.round(approvedList.length/scrutinized.length*100):'--';

  // Stats bar
  $('gov-stats').innerHTML=
    `<div class='gov-stat'><span class='gov-stat-num'>${tasks.length}</span><span class='gov-stat-label'>任务</span></div>`+

    `<div class='gov-stat'><span class='gov-stat-num red'>${f}</span><span class='gov-stat-label'>失败</span></div>`+

    (reviewed.length?reviewed.map(t=>{
      const ok=(t.scrutiny_note||'').includes('准奏');

      return `<div class='gov-entry'>
        <div class='gov-entry-dot ${ok?"approved":"rejected"}'></div>
        <span class='gov-entry-text' title='${esc(t.action||'')}'>#${t.id} ${esc((t.action||'').slice(0,40))}</span>
        <span class='gov-entry-tag'>${ok?'准奏':'驳回'}</span>
      </div>`;
    }).join(''):'<div style="font-size:.72rem;color:var(--text-dim)">暂无审查</div>');

  // ── 尚书省：六部执行进度 + 最近任务 + 最后活跃
  const deptKeys=['engineering','operations','protocol','security','quality','personnel'];
  const depts={};
  deptKeys.forEach(k=>{depts[k]={n:deptMap[k]||k,d:0,f:0,last:null,lastAction:''}});
  tasks.forEach(t=>{
    const k=(t.spec?.department)||'engineering';
    if(!depts[k])return;
    if(t.status==='done')depts[k].d++;
    if(t.status==='failed')depts[k].f++;
    if(!depts[k].last||(t.created_at&&t.created_at>depts[k].last)){
      depts[k].last=t.created_at;depts[k].lastAction=t.action||'';depts[k].lastStatus=t.status;
    }
  });
  const maxTotal=Math.max(1,...Object.values(depts).map(x=>x.d+x.f));
  $('gov-shangshu').innerHTML=`<div class='gov-block-head'><span class='gov-block-title'>尚书省</span><span class='gov-block-count'>六部</span></div>`+
    `<div class='dept-grid'>`+
    deptKeys.map(k=>{
      const dept=depts[k];
      const total=dept.d+dept.f;
      const doneW=Math.round(dept.d/maxTotal*100);
      const failW=Math.round(dept.f/maxTotal*100);
      const rate=total?Math.round(dept.d/total*100):0;
      const lastTime=dept.last?relTime(dept.last):'';
      const lastAct=dept.lastAction?esc(dept.lastAction.slice(0,30)):'';
      const statusCls=dept.lastStatus==='done'?'s-done':dept.lastStatus==='failed'?'s-failed':'';

          <span class='dept-grid-name'>${dept.n}</span>
          <div class='dept-grid-bar'>
            <div class='dept-grid-bar-done' style='width:${doneW}%'></div>
            <div class='dept-grid-bar-fail' style='width:${failW}%;left:${doneW}%'></div>
          </div>
          <span class='dept-grid-stat'>${dept.d}/${total} <span class='rate'>${rate}%</span></span>
        </div>
        ${lastAct?`<div class='dept-grid-last'>
          <span class='dept-grid-last-action ${statusCls}'>${lastAct}</span>
          <span class='dept-grid-last-time'>${lastTime}</span>
        </div>`:''}
      </div>`;
    }).join('')+
    `</div>`;

  // ── 最近任务（全宽网格，三省下方）
  const recentAll=tasks.slice(0,10);
  $('gov-recent').innerHTML=recentAll.map(t=>{
    const s=t.status||'pending';
    const dotCls=s==='done'?'done':s==='failed'?'failed':s==='running'?'running':s==='awaiting_approval'?'awaiting':s==='scrutiny_failed'?'scrutiny_failed':'pending';
    const dept=deptMap[(t.spec?.department)]||'';
    const time=t.created_at?relTime(t.created_at):'';
    const mode=t.spec?.cognitive_mode?`<span>${t.spec.cognitive_mode}</span>`:'';
    return `<div class='gov-task-item'>
      <div class='gov-task-dot ${dotCls}'></div>
      <span class='gov-task-dept'>${dept}</span>
      <span class='gov-task-action' title='${esc(t.action||'')}'>${esc((t.action||'').slice(0,70))}</span>
      <span class='gov-task-meta'>${mode}<span>#${t.id}</span></span>
      <span class='gov-task-time'>${time}</span>
    </div>`;
  }).join('')||'<div style="font-size:.72rem;color:var(--text-dim)">暂无任务</div>';
}

/* ── Policy Suggestions ── */
const _adopted={};  // key: "dept:action" → {taskId, status}
let _policyHistory=[];
async function loadPolicySuggestions(container, existingHtml){
  try{
    const items=await fetch('/api/policy-advisor/history').then(r=>r.json());
    // Build policy rec-items from denials with suggested_fix
    const denials=items.filter(i=>i.type==='denial');
    const autoApplied=items.filter(i=>i.type==='auto_applied');
    const suggestions=items.filter(i=>i.type==='suggestion');
    const policyItems=[];
    // From suggestion markdown: extract bullet lines
    for(const s of suggestions){
      const lines=(s.content||'').split('\n').filter(l=>l.startsWith('- ')).map(l=>l.slice(2));
      for(const line of lines){
        policyItems.push({dept:s.department,deptZh:s.department_zh,action:line,reason:`来自 ${s.department_zh} 政策观察`,priority:'medium'});
      }
    }
    // From denial suggested_fix
    for(const d of denials){
      if(d.suggested_fix){
        policyItems.push({dept:d.department,deptZh:d.department_zh,action:d.suggested_fix,reason:d.detail,priority:'high'});
      }
    }
    const policyHtml=policyItems.map(p=>{
      const safeAction=esc(p.action).replace(/"/g,'&quot;');
      const key=p.dept+':'+p.action;
      const a=_adopted[key];
      const btnHtml=a
        ?(a.status==='failed'
          ?`<button class='policy-adopt-btn' disabled style='border-color:var(--red);color:var(--red)'>#${a.taskId} 审批失败</button>`
          :a.status==='approving'
            ?`<button class='policy-adopt-btn' disabled style='border-color:var(--accent);color:var(--accent)'>审批中 #${a.taskId}...</button>`
            :`<button class='policy-adopt-btn' disabled style='border-color:var(--green);color:var(--green)'>执行中 #${a.taskId}</button>`)
        :`<button class='policy-adopt-btn' onclick="adoptSuggestion('${p.dept}','${safeAction}',this)">采纳派单</button>`;
      return`<div class='rec-item'><div class='rec-head'><div class='rec-action'>${esc(p.action)}<span class='rec-priority rec-${p.priority}'>${p.priority}</span><span class='policy-dept-tag'>${esc(p.deptZh)}</span></div>${btnHtml}</div><div class='rec-reason'>${esc(p.reason)}</div></div>`;
    }).join('');
    const combined=existingHtml+policyHtml;
    container.innerHTML=combined||"<div style='color:var(--text-dim);font-size:.8rem'>None</div>";
    // History = auto-applied
    _policyHistory=autoApplied;
    if(autoApplied.length){
      $('policy-history-btn').style.display='';
      renderPolicyHistory();
    }
  }catch{
    container.innerHTML=existingHtml||"<div style='color:var(--text-dim);font-size:.8rem'>None</div>";
  }
}
function renderPolicyHistory(){
  $('policy-history').innerHTML=_policyHistory.slice(0,20).map(h=>{
    const ts=h.ts?relTime(h.ts):'';
    const detail=h.detail||'';
    return`<div class='policy-history-item'>
      <div class='policy-h-dot'></div>
      <span class='policy-h-dept'>${esc(h.department_zh)}</span>
      <span class='policy-h-detail'>${esc(detail)}</span>
      <span class='policy-h-time'>${ts}</span>
    </div>`;
  }).join('')||"<div style='color:var(--text-dim);font-size:.72rem'>暂无历史记录</div>";
}
function togglePolicyHistory(){
  $('policy-history').classList.toggle('collapsed');
}
async function adoptSuggestion(dept,preview,btn){
  btn.disabled=true;btn.textContent='派单中...';
  const key=dept+':'+preview.replace(/&quot;/g,'"').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
  try{
    const resp=await fetch('/api/tasks',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        action:`采纳政策建议: ${preview}`,
        reason:'Dashboard 政策建议采纳派单',
        priority:'medium',
        spec:{department:dept,cognitive_mode:'execute'}
      })
    });
    const data=await resp.json();
    if(data.id){
      btn.textContent=`审批中 #${data.id}...`;
      _adopted[key]={taskId:data.id,status:'approving'};
      const approveResp=await fetch(`/api/tasks/${data.id}/approve`,{method:'POST'});
      const result=await approveResp.json();
      if(result.error){
        btn.textContent=`#${data.id} 审批失败`;btn.style.borderColor='var(--red)';btn.style.color='var(--red)';
        _adopted[key]={taskId:data.id,status:'failed'};
      }else{
        btn.textContent=`执行中 #${data.id}`;btn.style.borderColor='var(--green)';btn.style.color='var(--green)';
        _adopted[key]={taskId:data.id,status:'running'};
      }
      refreshTasks();
    }else{
      btn.textContent='失败';btn.style.borderColor='var(--red)';btn.style.color='var(--red)';
    }
  }catch{
    btn.textContent='失败';btn.style.borderColor='var(--red)';btn.style.color='var(--red)';
  }
}

let _heatmap={};
function renderHeatmap(data){
  _heatmap={};data.forEach(d=>_heatmap[d.day]=Number(d.count));
  const today=new Date(),start=new Date(today);start.setDate(start.getDate()-59);
  const dow=start.getDay()||7;start.setDate(start.getDate()-(dow-1));
  let html='';const cur=new Date(start);
  while(cur<=today){const iso=cur.toISOString().slice(0,10);const cnt=_heatmap[iso]||0;
    const lv=cnt===0?0:cnt<=3?1:cnt<=9?2:cnt<=19?3:4;
    html+=`<div class='hm-cell hm-${lv}' data-day='${iso}' data-count='${cnt}' onmouseenter='showTip(this,event)' onmouseleave='hideTip()'></div>`;
    cur.setDate(cur.getDate()+1)}
  $('heatmap').innerHTML=html;
  $('hm-start').textContent=start.toISOString().slice(5,10);
  $('hm-end').textContent=today.toISOString().slice(5,10);
}
function showTip(el,ev){const t=$('tooltip');t.textContent=`${el.dataset.day} | ${el.dataset.count} events`;t.style.display='block';t.style.left=ev.pageX+12+'px';t.style.top=ev.pageY-30+'px'}

/* ── Tasks ── */
const SZ={done:'完成',failed:'失败',running:'执行中',pending:'待处理',awaiting_approval:'待审批',scrutinizing:'审查中',scrutiny_failed:'驳回',preflight_failed:'预检失败'};
const SC={done:'t-done',failed:'t-failed',running:'t-running',pending:'t-pending',awaiting_approval:'t-awaiting',scrutinizing:'t-awaiting',scrutiny_failed:'t-failed'};
const SD={done:'task-dot-done',failed:'task-dot-failed',running:'task-dot-running',pending:'task-dot-pending',awaiting_approval:'task-dot-awaiting',scrutinizing:'task-dot-awaiting',scrutiny_failed:'task-dot-failed'};
async function refreshTasks(){
  try{const tasks=await fetch('/api/tasks').then(r=>r.json());_tasks=tasks;renderTasks(tasks);renderGovernance(tasks)}catch{}
}
function renderTasks(tasks){
  const deptMap={engineering:'工部',operations:'户部',protocol:'礼部',security:'兵部',quality:'刑部',personnel:'吏部'};
  const counts={};tasks.forEach(t=>{counts[t.status]=(counts[t.status]||0)+1});
  $('task-stats').innerHTML=Object.entries(counts).map(([s,c])=>`<span class='t-badge ${SC[s]||'t-pending'}'>${SZ[s]||s} ${c}</span>`).join('');
  if(!tasks.length){$('task-list').innerHTML="<div style='color:var(--text-dim);font-size:.75rem;padding:8px 0'>暂无任务</div>";return}
  const activeS=['running','pending','awaiting_approval','scrutinizing'];
  const active=tasks.filter(t=>activeS.includes(t.status));
  const history=tasks.filter(t=>!activeS.includes(t.status));
  function taskRow(t,dim){
    const ts=t.created_at?relTime(t.created_at):'';
    const dept=deptMap[t.spec?.department]||'';
    const dur=t.started_at&&t.finished_at?Math.round((new Date(t.finished_at)-new Date(t.started_at))/1000)+'s':'';
    const approve=(t.status==='awaiting_approval'||t.status==='pending')?`<button class='btn-approve' onclick='event.stopPropagation();openModal(${t.id})'>执行</button>`:'';
    let detail='';
    if(t.spec?.problem)detail+=`<div class='gov-entry'><span class='gov-entry-tag' style='min-width:40px'>问题</span><span class='gov-entry-text'>${esc(t.spec.problem)}</span></div>`;
    if(t.spec?.observation)detail+=`<div class='gov-entry'><span class='gov-entry-tag' style='min-width:40px'>观察</span><span class='gov-entry-text'>${esc(t.spec.observation)}</span></div>`;
    if(t.scrutiny_note)detail+=`<div class='gov-entry'><span class='gov-entry-tag' style='min-width:40px'>审查</span><span class='gov-entry-text'>${esc(t.scrutiny_note)}</span></div>`;
    if(t.output)detail+=`<div style='margin-top:8px;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:.68rem;color:var(--text-mid);white-space:pre-wrap;word-break:break-word;max-height:160px;overflow-y:auto'>${esc((t.output||'').slice(0,500))}</div>`;
    const hasDetail=detail?`<div class='task-detail'>${detail}</div>`:'';
    return`<div class='task-row'${dim?' style="opacity:.5"':''} onclick="this.nextElementSibling?.classList.toggle('open')">
      <div class='task-dot s-${t.status}'></div>
      <span class='task-id'>#${t.id}</span>
      <span class='task-dept'>${dept}</span>
      <div class='task-body'>
        <div class='task-action' title='${esc(t.action||'')}'>${esc((t.action||'').slice(0,70))}</div>
        <div class='task-meta-line'>${ts}${dur?' · '+dur:''}</div>
      </div>
      <span class='task-status'>${SZ[t.status]||t.status}</span>
      ${approve}
    </div>${hasDetail}`}
  let html='';
  if(active.length){
    html+=`<div class='gov-sub-label'>进行中 · ${active.length}</div>`;
    html+=active.map(t=>taskRow(t,false)).join('');
  }
  if(history.length){
    html+=`<div class='gov-sub-label'${active.length?' style="margin-top:16px"':''}>历史 · ${history.length}</div>`;
    const vis=history.slice(0,10);
    html+=vis.map(t=>taskRow(t,true)).join('');
    if(history.length>10){
      html+=`<div id="task-rest" style="display:none">${history.slice(10).map(t=>taskRow(t,true)).join('')}</div>`;
      html+=`<button class='logs-btn' style='margin-top:8px' onclick='$("task-rest").style.display="";this.style.display="none"'>显示全部 ${history.length} 条</button>`;
    }
  }
  $('task-list').innerHTML=html||"<div style='color:var(--text-dim);font-size:.75rem;padding:8px 0'>暂无任务</div>";
}

/* ── Insights render ── */
function renderInsightsSection(insights) {
  // Overview
  const ov = $('insights-overview');
  if (insights.overview) {
    ov.textContent = insights.overview;
  } else {
    ov.innerHTML = "<span style='color:var(--text-dim)'>Awaiting first insight generation</span>";
  }
  // Patterns
  const pa = $('insights-patterns');
  if (Array.isArray(insights.patterns) && insights.patterns.length) {
    pa.innerHTML = insights.patterns.map(p => `<div class='pattern-item'>${esc(p)}</div>`).join('');
  } else {
    pa.innerHTML = "<div style='color:var(--text-dim);font-size:.8rem'>None</div>";
  }
  // Recommendations + policy suggestions merged
  const re = $('insights-recs');
  const recHtml = (Array.isArray(insights.recommendations) && insights.recommendations.length)
    ? insights.recommendations.map((r,i) => {
        const safeAction = esc(r.action||'').replace(/"/g,'&quot;');
        const rKey='engineering:'+(r.action||'');
        const ra=_adopted[rKey];
        const rBtnHtml=ra
          ?(ra.status==='failed'
            ?`<button class='policy-adopt-btn' disabled style='border-color:var(--red);color:var(--red)'>#${ra.taskId} 审批失败</button>`
            :ra.status==='approving'
              ?`<button class='policy-adopt-btn' disabled style='border-color:var(--accent);color:var(--accent)'>审批中 #${ra.taskId}...</button>`
              :`<button class='policy-adopt-btn' disabled style='border-color:var(--green);color:var(--green)'>执行中 #${ra.taskId}</button>`)
          :`<button class='policy-adopt-btn' onclick="adoptSuggestion('engineering','${safeAction}',this)">采纳派单</button>`;
        return `<div class='rec-item'><div class='rec-head'><div class='rec-action'>${esc(r.action||'')}<span class='rec-priority rec-${r.priority||'low'}'>${r.priority||''}</span></div>${rBtnHtml}</div><div class='rec-reason'>${esc(r.reason||'')}</div></div>`;
      }).join('')
    : '';
  // Also load policy suggestions into the same list
  loadPolicySuggestions(re, recHtml);
}

function renderDailySummary(summary) {
  const el = $('daily-summary');
  const latest = summary.summaries?.[0];
  if (!latest) { el.innerHTML = '<span style="color:var(--text-dim)">Awaiting first analysis</span>'; return; }
  try {
    const d = JSON.parse(latest.summary || '{}');
    const parts = [];

    // Headline
    if (d.summary) parts.push('<div class="daily-headline">' + esc(d.summary) + '</div>');

    // Topic tags
    if (d.top_topics?.length) {
      parts.push('<div class="daily-topics">' + d.top_topics.map(t =>
        '<span class="daily-topic-tag">' + esc(t) + '</span>'
      ).join('') + '</div>');
    }

    // Time breakdown as mini bars
    if (d.time_breakdown && Object.keys(d.time_breakdown).length) {
      const entries = Object.entries(d.time_breakdown).sort((a,b) => b[1] - a[1]);
      const maxMin = Math.max(...entries.map(e => e[1]), 1);
      parts.push('<div class="daily-time-grid">' + entries.map(([k, v]) => {
        const hrs = (v / 60).toFixed(1);
        const pct = Math.round((v / maxMin) * 100);
        return '<div class="daily-time-row">' +
          '<span class="time-label">' + esc(k) + '</span>' +
          '<span class="time-bar-wrap"><span class="time-bar-fill" style="width:' + pct + '%"></span></span>' +
          '<span class="time-val">' + hrs + 'h</span>' +
        '</div>';
      }).join('') + '</div>');
    }

    el.innerHTML = parts.join('') || '<span style="color:var(--text-dim)">Awaiting first analysis</span>';

    // Behavioral insights — rendered above the card
    const beh = $('daily-behavior');
    beh.textContent = d.behavioral_insights || '';
  } catch { el.innerHTML = '<p>' + esc(latest.summary || '') + '</p>'; }
}

/* ── Debts ── */
function renderDebts(debts){
  const el=$('debt-list');
  const openArr=debts.filter(d=>(d.status||'open')==='open');
  const open=openArr.length;
  const highOpen=openArr.filter(d=>d.severity==='high');
  $('debt-count').textContent=debts.length?`${open} 未解决 / ${debts.length} 总计`:'';
  if(!debts.length){el.innerHTML="<div style='color:var(--text-dim);font-size:.8rem;padding:8px 0'>暂无债务</div>";return}
  let alertHtml='';
  if(highOpen.length>0){
    const names=highOpen.slice(0,3).map(d=>esc((d.summary||'').slice(0,35))).join('、');
    alertHtml=`<div class="gov-entry" style="padding:6px 0 12px;border-bottom:1px solid var(--border);margin-bottom:4px"><div class="gov-entry-dot rejected"></div><span class="gov-entry-text"><strong>${highOpen.length} 个高优先级</strong>待处理：${names}${highOpen.length>3?'…':''}</span></div>`;
  }

  // Group by project
  const groups={};debts.forEach(d=>{const p=d.project||'未分类';if(!groups[p])groups[p]=[];groups[p].push(d)});

  // Sort: projects with open debts first, all-dismissed/resolved projects last
  const sorted=Object.entries(groups).sort((a,b)=>{
    const aOpen=a[1].filter(d=>(d.status||'open')==='open').length;
    const bOpen=b[1].filter(d=>(d.status||'open')==='open').length;
    if(aOpen===0&&bOpen>0)return 1;
    if(bOpen===0&&aOpen>0)return -1;
    return bOpen-aOpen;
  });

  let html='';
  sorted.forEach(([proj,items],idx)=>{
    const pOpen=items.filter(d=>(d.status||'open')==='open').length;
    const pHigh=items.filter(d=>d.severity==='high'&&(d.status||'open')==='open').length;
    const pMed=items.filter(d=>d.severity==='medium'&&(d.status||'open')==='open').length;
    const allDone=pOpen===0;
    const id='debt-g-'+idx;

    // All-dismissed projects start collapsed
    html+=`<div class='debt-group${allDone?" debt-group-done":""}'>
      <div class='debt-proj-row' onclick="var d=$('${id}'),a=this.querySelector('.debt-proj-arrow');d.classList.toggle('open');a.classList.toggle('open')">
        <span class='debt-proj-arrow${allDone?"":" open"}'>&#9654;</span>
        <span class='debt-proj-name${allDone?" debt-proj-muted":""}'>${esc(proj)}</span>
        <div class='debt-proj-badges'>
          ${pHigh?`<span class='debt-proj-sev high'>${pHigh}</span>`:''}
          ${pMed?`<span class='debt-proj-sev med'>${pMed}</span>`:''}
        </div>
        ${pOpen>0?`<div class='debt-actions'><button class='logs-btn' onclick='event.stopPropagation();debtProjectDismiss("${esc(proj)}",this)'>全部忽略</button><button class='logs-btn' onclick='event.stopPropagation();debtProjectIgnore("${esc(proj)}",this)' style='color:var(--red)'>永久忽略</button></div>`:''}
        <span class='debt-proj-count'>${allDone?'已处理':pOpen+' / '+items.length}</span>
      </div>
      <div class='debt-detail${allDone?"":" open"}' id='${id}'>`;

    html+=items.map(d=>{
      const sevCls={'high':'debt-sev-high','medium':'debt-sev-medium','low':'debt-sev-low'}[d.severity]||'debt-sev-low';
      const sevLabel={'high':'HIGH','medium':'MED','low':'LOW'}[d.severity]||d.severity;
      const st=(d.status||'open');
      const stCls=st==='resolved'?'debt-status-resolved':st==='dismissed'?'debt-status-dismissed':'debt-status-open';
      const stLabel=st==='resolved'?'已解决':st==='dismissed'?'已忽略':'未解决';
      const ts=d.created_at?relTime(d.created_at):'';
      const actions=st==='open'
        ?`<div class='debt-actions'><button class='logs-btn' onclick='debtAction(${d.id},"resolve",this)'>已解决</button><button class='logs-btn' onclick='debtAction(${d.id},"dismiss",this)'>忽略</button></div>`
        :`<div class='debt-actions'><button class='logs-btn' onclick='debtAction(${d.id},"reopen",this)'>重新打开</button></div>`;
      return`<div class='debt-item${st!=="open"?" debt-item-done":""}'>
        <div class='debt-head'>
          <span class='debt-severity ${sevCls}'>${sevLabel}</span>
          <span class='debt-status ${stCls}'>${stLabel}</span>
          ${actions}
          <span style='font-size:.6rem;color:var(--text-dim);margin-left:auto'>${ts}</span>
        </div>
        <div class='debt-summary'>${esc(d.summary||'')}</div>
      </div>`}).join('');

    html+=`</div></div>`;
  });
  el.innerHTML=alertHtml+html;

  // Toggle button for dismissed projects
  const doneCount=sorted.filter(([,items])=>items.every(d=>(d.status||'open')!=='open')).length;
  const toggleBtn=$('debt-toggle-dismissed');
  if(doneCount>0){
    toggleBtn.style.display='';
    toggleBtn.textContent=`显示已忽略项目 (${doneCount})`;
    toggleBtn.dataset.shown='0';
  }else{
    toggleBtn.style.display='none';
  }
}

/* ── Debt actions ── */
async function debtAction(id,action,btn){
  btn.disabled=true;const orig=btn.textContent;btn.textContent='…';
  try{
    await fetch(`/api/debts/${id}/${action}`,{method:'POST'});
    // Re-render debts only (don't collapse project group via full reload)
    const debts=await fetch('/api/debts').then(r=>r.json()).catch(()=>[]);
    renderDebts(debts);
  }catch{btn.textContent='失败';setTimeout(()=>{btn.textContent=orig;btn.disabled=false},1500)}
}

  }catch{btn.textContent='失败';setTimeout(()=>{btn.textContent='全部忽略';btn.disabled=false},1500)}

      fetch('/api/pipeline/status').then(r=>r.json()).catch(()=>({})),
      fetch('/api/agents/live').then(r=>r.json()).catch(()=>({agents:[]})),
    ]);
    const colls=pipeline.collectors||{};
    const el=$('sys-collectors');
    const names=Object.keys(colls);
    if(!names.length){el.innerHTML="<div class='gov-entry'><span style='color:var(--text-dim)'>无采集器数据</span></div>";
    }else{
      el.innerHTML=names.map(n=>{
        const c=colls[n];const cnt=c.last_count||0;
        const dotCls=cnt>0?'approved':(c.status==='ok'?'manual':'rejected');
        return`<div class='gov-entry'><div class='gov-entry-dot ${dotCls}'></div><span class='gov-entry-text'>${esc(n)}</span><span class='gov-entry-tag'>${cnt} 事件</span></div>`;
      }).join('');
    }
    // Channel 状态
    try{
      const ch=await fetch('/api/channels').then(r=>r.json()).catch(()=>({}));
      const chEl=$('sys-channels');
      const chNames=Object.keys(ch);
      if(chNames.length){
        chEl.innerHTML=chNames.map(n=>{
          const info=ch[n];const dotCls=info.enabled?'approved':'rejected';
          return`<div class='gov-entry'><div class='gov-entry-dot ${dotCls}'></div><span class='gov-entry-text'>${esc(n)}</span><span class='gov-entry-tag'>${info.type}</span></div>`;
        }).join('');
      }else{chEl.innerHTML=''}
    }catch{}
    const deptStats=pipeline.departments||{};
    const running=Object.values(deptStats).reduce((s,d)=>s+(d.tasks_running||0),0);
    $('sys-meta').textContent=running?`${running} 执行中`:'空闲';
    const ag=$('sys-agents');
    if(agents.agents?.length){
      ag.innerHTML=agents.agents.map(a=>{

    }else{ag.innerHTML=''}
  }catch{}

/* ── Glance ── */
function renderGlance(stats,events,tasks,debts,summary,insights){
  const el=$('glance-entries');
  const openArr=debts.filter(d=>(d.status||'open')==='open');
  const highDebts=openArr.filter(d=>d.severity==='high');
  const done=tasks.filter(t=>t.status==='done').length;
  const failed=tasks.filter(t=>t.status==='failed').length;
  const running=tasks.filter(t=>t.status==='running').length;
  const pending=tasks.filter(t=>t.status==='pending'||t.status==='awaiting_approval').length;
  const passRate=(done+failed)>0?Math.round(done/(done+failed)*100):null;
  let dailyLine='';
  const latest=summary.summaries?.[0];
  if(latest){try{const d=JSON.parse(latest.summary||'{}');dailyLine=d.summary||''}catch{dailyLine=latest.summary||''}}
  const items=[];
  const wsOn=!$('h-dot').classList.contains('off');
  items.push(`<div class="gov-entry"><div class="gov-entry-dot ${wsOn?'approved':'rejected'}"></div><span class="gov-entry-text">${wsOn?'在线':'离线'}，已采集 <strong>${(stats.total||0).toLocaleString()}</strong> 条数据</span><a class="glance-link" href="#section-sys">系统 →</a></div>`);
  if(openArr.length>0){
    items.push(`<div class="gov-entry"><div class="gov-entry-dot rejected"></div><span class="gov-entry-text"><strong>${openArr.length}</strong> 个未解决债务${highDebts.length>0?'，<strong>'+highDebts.length+' 个高优先</strong>':''}${pending>0?'；<strong>'+pending+'</strong> 个任务待处理':''}</span><a class="glance-link" href="#section-debt">债务 →</a></div>`);
  }else{
    items.push(`<div class="gov-entry"><div class="gov-entry-dot approved"></div><span class="gov-entry-text">无未解决债务${pending>0?'　<strong>'+pending+'</strong> 个任务待处理':''}</span></div>`);
  }
  if(passRate!==null){
    const dotCls=passRate>=70?'approved':passRate>=50?'manual':'rejected';
    items.push(`<div class="gov-entry"><div class="gov-entry-dot ${dotCls}"></div><span class="gov-entry-text">通过率 <strong>${passRate}%</strong>（${done} 完成 / ${failed} 失败）${running>0?'，<strong>'+running+'</strong> 执行中':''}</span><a class="glance-link" href="#section-tasks">任务 →</a></div>`);
  }
  if(dailyLine){
    const short=dailyLine.length>60?dailyLine.slice(0,60)+'…':dailyLine;
    items.push(`<div class="gov-entry"><div class="gov-entry-dot auto"></div><span class="gov-entry-text">${esc(short)}</span><a class="glance-link" href="#section-insights">洞察 →</a></div>`);
  }
  el.innerHTML=items.join('');
}

function renderPageStats(stats,tasks,debts){
  const el=$('page-stats');
  const openDebts=debts.filter(d=>(d.status||'open')==='open').length;
  const done=tasks.filter(t=>t.status==='done').length;
  const failed=tasks.filter(t=>t.status==='failed').length;
  const passRate=(done+failed)>0?Math.round(done/(done+failed)*100):null;
  const running=tasks.filter(t=>t.status==='running').length;
  const debtCls=openDebts>0?'red':'green';
  const rateCls=passRate===null?'':passRate>=70?'green':passRate>=50?'':'red';
  el.innerHTML=[
    `<div class="gov-stat"><span class="gov-stat-num">${(stats.total||0).toLocaleString()}</span><span class="gov-stat-label">事件</span></div>`,
    `<div class="gov-stat"><span class="gov-stat-num ${debtCls}">${openDebts}</span><span class="gov-stat-label">未解决债务</span></div>`,
    passRate!==null?`<div class="gov-stat"><span class="gov-stat-num ${rateCls}">${passRate}%</span><span class="gov-stat-label">通过率</span></div>`:'',
    `<div class="gov-stat"><span class="gov-stat-num">${tasks.length}</span><span class="gov-stat-label">任务</span></div>`,
    running>0?`<div class="gov-stat"><span class="gov-stat-num blue">${running}</span><span class="gov-stat-label">执行中</span></div>`:'',
  ].filter(Boolean).join('');
}

let _historyItems=[];
async function loadRoastHistory(){
  try{
    const items=await fetch('/api/profile-analysis/history').then(r=>r.json());
    const past=items.slice(1);
    if(!past.length){$('roast-history-btn').style.display='none';return}
    $('roast-history-btn').style.display='';
    _historyItems=past;
    $('roast-history').innerHTML=past.map((r,i)=>{
      const ts=(r.date||'').replace('T',' ').slice(0,16);
      const text=r.commentary||r.daily_note;
      return`<div class='roast-history-item' style='animation-delay:${i*0.08}s'><div class='roast-history-date'>${esc(ts)}<button class='history-play-btn' onclick='playHistory(${i})' title='Play'>&#9654;</button></div><div class='roast-history-text'>${esc(text)}</div></div>`
    }).join('');
  }catch{}
}
function playHistory(idx){
  const item=_historyItems[idx];
  if(!item)return;
  const text=item.commentary||item.daily_note;
  const voice=item.voice||null;
  _requestTTS(text, voice);
}
function _requestTTS(text, reference_id){
  voiceBtn.classList.add('loading');
  voiceBtn.classList.remove('playing');
  startTtsTimer();
  const body=reference_id?{text,reference_id}:{text};
  fetch('/api/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).catch(()=>{
    stopTtsTimer();voiceBtn.classList.remove('loading');setVoiceStatus('Voice service unavailable','error');setTimeout(()=>setVoiceStatus(''),4000);
  });
}
function toggleRoastHistory(){
  const el=$('roast-history');
  const btn=$('roast-history-btn');
  el.classList.toggle('collapsed');
  btn.textContent=el.classList.contains('collapsed')?'往期语录':'收起';
}

function setVoiceStatus(text, cls) {
  voiceStatus.textContent = text;
  voiceStatus.className = 'voice-status' + (cls ? ' ' + cls : '');
}

let _ttsPhase = 'generating';

function startTtsTimer() {
  let sec = 0;
  _updateTtsLabel(sec);
  _ttsTimer = setInterval(() => { sec++; _updateTtsLabel(sec); }, 1000);
}

function _updateTtsLabel(sec) {
  if (_ttsPhase === 'compiling') {
    setVoiceStatus(`First run, compiling model... ${sec}s (~60s)`, 'active');
  } else {
    setVoiceStatus(`Generating voice... ${sec}s`, 'active');
  }
}

function stopTtsTimer() {
  if (_ttsTimer) { clearInterval(_ttsTimer); _ttsTimer = null; }
}

function speakRoast() {
  // If audio is playing, pause it
  if (!voiceAudio.paused && voiceAudio.src) {
    voiceAudio.pause();
    voiceBtn.classList.remove('playing');
    return;
  }
  // If audio is paused (has src and currentTime > 0), resume
  if (voiceAudio.paused && voiceAudio.src && voiceAudio.currentTime > 0) {
    voiceAudio.play();
    voiceBtn.classList.add('playing');
    return;
  }
  // Otherwise generate new
  const roastEl = document.getElementById('roast');
  const text = roastEl?.textContent?.trim();
  if (!text || text === 'Observing...') return;
  _requestTTS(text, null);
}
</script>
