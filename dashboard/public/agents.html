<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orchestrator Agents</title>
<style>
:root {
  --bg:    #08080d; --card:  #0f0f17; --inset: #0a0a12;
  --b1:    #1c1c28; --b2:    #141420;
  --t1:    #dddde8; --t2:    #6b6b82; --t3:    #38384a;
  --green: #4ade80; --amber: #fbbf24; --red:   #f87171;
  --indigo:#818cf8; --blue:  #60a5fa;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t1);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;-webkit-font-smoothing:antialiased;overflow:hidden;display:flex;flex-direction:column;}

/* ── Toolbar ── */
#tb{position:fixed;top:0;left:0;right:0;height:40px;background:var(--card);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;}
.tl{font-size:11px;font-weight:700;color:var(--green);letter-spacing:2px;}
.ts{width:1px;height:16px;background:var(--b1);}
.th{font-size:10px;color:var(--t3);}
.nav-links{display:flex;gap:4px;}
.nav-link{font-size:10px;padding:3px 10px;border-radius:10px;text-decoration:none;color:var(--t2);transition:all .2s;}
.nav-link:hover{color:var(--t1);background:var(--b1);}
.nav-link.active{color:var(--green);background:#0d1f12;}
.tr{margin-left:auto;display:flex;align-items:center;gap:16px;}
.tp{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tst{font-size:10px;color:var(--green);}
.tst.off{color:var(--red);}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--b1);border-radius:10px;}
.ch{padding:11px 14px 10px;border-bottom:1px solid var(--b2);display:flex;align-items:center;gap:8px;}
.ci{font-size:13px;} .ct{font-size:11px;font-weight:600;letter-spacing:.2px;}
.cb{padding:14px 16px;}
.badge{margin-left:auto;font-size:10px;padding:2px 8px;border-radius:12px;}
.bg{color:var(--green);background:#0d1f12;}
.bb{color:var(--blue);background:#0d1320;}
.bi{color:var(--indigo);background:#100d1f;}
.ba{color:var(--amber);background:#1f1800;font-size:10px;padding:2px 8px;border-radius:12px;}
.br{color:var(--red);background:#1f0d0d;font-size:10px;padding:2px 8px;border-radius:12px;}
.bd{color:var(--t3);background:var(--inset);}

/* ── Active Agents Strip ── */
#agents-strip{margin-top:40px;min-height:82px;border-bottom:1px solid var(--b1);background:var(--card);display:flex;align-items:center;padding:0 20px;gap:10px;overflow-x:auto;flex-shrink:0;}
#agents-strip::-webkit-scrollbar{height:4px;}
#agents-strip::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px;}
.agent-card{flex-shrink:0;background:var(--inset);border:1px solid var(--b1);border-radius:8px;padding:10px 14px;cursor:pointer;transition:border-color .2s;min-width:200px;max-width:280px;position:relative;}
.agent-card:hover{border-color:var(--t3);}
.agent-card.selected{border-color:var(--green);box-shadow:0 0 8px #4ade8018;}
.agent-card .ac-top{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.agent-card .ac-dept{font-size:9px;font-weight:600;padding:2px 6px;border-radius:10px;}
.agent-card .ac-action{font-size:11px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.agent-card .ac-bottom{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--t2);}
.agent-card .ac-project{color:var(--t3);}
.agent-card .ac-turns{font-variant-numeric:tabular-nums;}
.agent-card .ac-elapsed{font-variant-numeric:tabular-nums;font-family:'Courier New',monospace;color:var(--t2);}
.ac-pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0;}
.cm-badge{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:600;letter-spacing:.3px;}
.cm-direct{color:var(--blue);background:#0d1320;}
.cm-react{color:var(--green);background:#0d1f12;}
.cm-hypothesis{color:var(--amber);background:#1f1800;}
.cm-designer{color:var(--indigo);background:#100d1f;}
.strip-empty{font-size:11px;color:var(--t3);padding:10px 0;}

/* ── Main content area ── */
#main{flex:1;display:flex;overflow:hidden;background-image:radial-gradient(circle,#18182a 1px,transparent 1px);background-size:28px 28px;}

/* ── Event Stream ── */
#events-panel{flex:0 0 65%;display:flex;flex-direction:column;border-right:1px solid var(--b1);min-width:0;}
#events-header{padding:10px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:8px;background:var(--card);flex-shrink:0;}
#events-header .ct{flex:1;}
#event-count{font-size:10px;color:var(--t3);font-variant-numeric:tabular-nums;}
#filter-label{font-size:10px;color:var(--amber);display:none;}
#clear-filter{font-size:9px;padding:2px 8px;border-radius:10px;background:#1f1800;color:var(--amber);border:none;cursor:pointer;display:none;}
#clear-filter:hover{background:#2a2200;}
#events-scroll{flex:1;overflow-y:auto;padding:8px 12px;}
#events-scroll::-webkit-scrollbar{width:5px;}
#events-scroll::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px;}

/* Event items */
.evt{padding:8px 10px;border-radius:6px;margin-bottom:4px;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.evt-turn{background:var(--inset);border:1px solid var(--b2);}
.evt-progress{background:transparent;border-left:2px solid var(--b1);margin-left:12px;padding:4px 10px;}
.evt-subtask{background:#100d1f;border:1px solid #2a1f4a;border-left:3px solid var(--indigo);}
.evt-result{border:1px solid var(--b1);}
.evt-result.success{border-color:#2d4a2d;background:#0d1f1208;}
.evt-result.error{border-color:#3a1a1a;background:#1f0d0d08;}

.evt-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap;}
.evt-task-id{font-size:9px;color:var(--t3);font-family:'Courier New',monospace;}
.evt-time{font-size:9px;color:var(--t3);margin-left:auto;font-variant-numeric:tabular-nums;}
.evt-turn-num{font-size:9px;font-weight:700;color:var(--blue);background:#0d1320;padding:1px 6px;border-radius:8px;}
.evt-tool-badge{font-size:9px;font-weight:600;color:var(--indigo);background:#100d1f;padding:1px 6px;border-radius:8px;}
.evt-thinking{font-size:10px;color:var(--t3);line-height:1.4;cursor:pointer;max-height:18px;overflow:hidden;transition:max-height .3s;}
.evt-thinking.expanded{max-height:400px;}
.evt-thinking::before{content:'> ';color:var(--t3);}
.evt-text{font-size:11px;color:var(--t2);line-height:1.5;margin-top:4px;}
.evt-tool-desc{font-size:10px;color:var(--t2);}
.evt-subtask-desc{font-size:11px;color:var(--indigo);}
.evt-summary{display:flex;gap:12px;font-size:10px;color:var(--t2);margin-top:4px;}
.evt-summary span{display:flex;align-items:center;gap:4px;}
.evt-separator{border:none;border-top:1px solid var(--b2);margin:8px 0;}
.empty-state{font-size:11px;color:var(--t3);text-align:center;padding:40px 0;}

/* ── Sidebar ── */
#sidebar{flex:0 0 35%;display:flex;flex-direction:column;overflow-y:auto;padding:12px;gap:12px;}
#sidebar::-webkit-scrollbar{width:5px;}
#sidebar::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px;}

/* Scenario cards */
.scenario-card{background:var(--inset);border:1px solid var(--b1);border-radius:8px;padding:12px;}
.scenario-card .sc-name{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:4px;}
.scenario-card .sc-desc{font-size:10px;color:var(--t2);margin-bottom:8px;line-height:1.4;}
.scenario-card .sc-depts{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.scenario-card .sc-dept{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:600;}
.sc-actions{display:flex;align-items:center;gap:8px;}
.sc-run{font-size:10px;padding:4px 12px;border-radius:8px;border:1px solid var(--green);background:#0d1f12;color:var(--green);cursor:pointer;font-weight:600;transition:all .2s;}
.sc-run:hover{background:#1a3a1a;box-shadow:0 0 8px #4ade8020;}
.sc-run:disabled{opacity:.5;cursor:not-allowed;}
.sc-status{font-size:10px;}
.sc-status.dispatching{color:var(--amber);}
.sc-status.dispatched{color:var(--green);}
.sc-status.error{color:var(--red);}

/* Recent completed */
.recent-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:5px;background:var(--inset);}
.recent-item .ri-icon{font-size:11px;flex-shrink:0;}
.recent-item .ri-action{font-size:11px;color:var(--t1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.recent-item .ri-dept{font-size:9px;padding:1px 5px;border-radius:8px;font-weight:600;}
.recent-item .ri-dur{font-size:10px;color:var(--t3);font-variant-numeric:tabular-nums;flex-shrink:0;}
.rl{display:flex;flex-direction:column;gap:3px;}

@media(max-width:900px){
  #main{flex-direction:column;}
  #events-panel{flex:none;height:55%;border-right:none;border-bottom:1px solid var(--b1);}
  #sidebar{flex:none;height:45%;}
}
</style>
</head>
<body>

<!-- ── Toolbar ── -->
<div id="tb">
  <span class="tl">ORCH</span><div class="ts"></div>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Dashboard</a>
    <a href="preview.html" class="nav-link">Pipeline</a>
    <a href="agents.html" class="nav-link active">Agents</a>
  </div>
  <div class="tr">
    <div class="tp" id="sys-pulse"></div>
    <span class="tst" id="sys-status">连接中...</span>
    <span class="th" id="agent-count"></span>
  </div>
</div>

<!-- ── Active Agents Strip ── -->
<div id="agents-strip">
  <div class="strip-empty" id="strip-empty">无活跃 Agent</div>
</div>

<!-- ── Main content ── -->
<div id="main">

  <!-- Event Stream -->
  <div id="events-panel">
    <div id="events-header">
      <span class="ci">📡</span>
      <span class="ct">Agent 事件流</span>
      <span id="filter-label"></span>
      <button id="clear-filter">清除筛选</button>
      <span id="event-count">0 events</span>
    </div>
    <div id="events-scroll">
      <div class="empty-state" id="events-empty">等待事件...</div>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <!-- Scenarios -->
    <div class="card">
      <div class="ch"><span class="ci">🎭</span><span class="ct">并行场景</span></div>
      <div class="cb">
        <div class="rl" id="scenarios-list">
          <div class="empty-state">加载中...</div>
        </div>
      </div>
    </div>

    <!-- Recent Completed -->
    <div class="card">
      <div class="ch"><span class="ci">✅</span><span class="ct">最近完成</span><span class="badge bd" id="done-count">--</span></div>
      <div class="cb">
        <div class="rl" id="recent-list">
          <div class="empty-state">加载中...</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
/* ══════════════════════════════════════
   State
   ══════════════════════════════════════ */
let activeAgents = [];
let events = [];
let filterTaskId = null;
let userScrolledUp = false;
let sseSource = null;
let apiOnline = false;
const MAX_EVENTS = 200;

const deptNames = {
  engineering: '工部', operations: '户部', quality: '刑部',
  protocol: '礼部', security: '兵部', personnel: '吏部'
};
const deptColors = {
  engineering: { fg: '#4ade80', bg: '#0d1f12' },
  operations:  { fg: '#60a5fa', bg: '#0d1320' },
  quality:     { fg: '#f87171', bg: '#1f0d0d' },
  protocol:    { fg: '#818cf8', bg: '#100d1f' },
  security:    { fg: '#fbbf24', bg: '#1f1800' },
  personnel:   { fg: '#9090a8', bg: '#0a0a12' }
};

/* ══════════════════════════════════════
   Helpers
   ══════════════════════════════════════ */
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function relTime(ts) {
  if (!ts) return '--';
  const diff = Date.now() - new Date(ts).getTime();
  if (diff < 0) return '刚刚';
  const s = Math.floor(diff / 1000);
  if (s < 60) return `${s}秒前`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}分前`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}时前`;
  return `${Math.floor(h / 24)}天前`;
}

function elapsed(startTs) {
  if (!startTs) return '--:--';
  const diff = Math.max(0, Math.floor((Date.now() - new Date(startTs).getTime()) / 1000));
  const m = Math.floor(diff / 60);
  const s = diff % 60;
  if (m >= 60) {
    const h = Math.floor(m / 60);
    return `${h}:${String(m % 60).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  }
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function deptBadge(dept) {
  const name = deptNames[dept] || dept || '';
  if (!name) return '';
  const c = deptColors[dept] || { fg: '#9090a8', bg: '#0a0a12' };
  return `<span class="sc-dept" style="color:${c.fg};background:${c.bg}">${esc(name)}</span>`;
}

function deptBadgeSmall(dept) {
  const name = deptNames[dept] || dept || '';
  if (!name) return '';
  const c = deptColors[dept] || { fg: '#9090a8', bg: '#0a0a12' };
  return `<span class="ac-dept" style="color:${c.fg};background:${c.bg}">${esc(name)}</span>`;
}

function cmBadge(mode) {
  if (!mode) return '';
  const m = mode.toLowerCase();
  const cls = ['direct', 'react', 'hypothesis', 'designer'].includes(m) ? `cm-${m}` : 'cm-direct';
  return `<span class="cm-badge ${cls}">${esc(mode)}</span>`;
}

function taskIcon(status) {
  if (!status) return '⏳';
  const s = status.toLowerCase();
  if (s === 'completed' || s === 'done' || s === 'success') return '✅';
  if (s === 'running' || s === 'active') return '🔄';
  if (s === 'failed' || s === 'error') return '❌';
  return '📋';
}

function formatDuration(seconds) {
  if (!seconds && seconds !== 0) return '--';
  const s = Math.round(seconds);
  if (s < 60) return `${s}s`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m${s % 60}s`;
  const h = Math.floor(m / 60);
  return `${h}h${m % 60}m`;
}

function formatCost(cost) {
  if (!cost && cost !== 0) return '';
  return `$${Number(cost).toFixed(4)}`;
}

async function fetchJSON(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch { return null; }
}

/* ══════════════════════════════════════
   Active Agents Strip
   ══════════════════════════════════════ */
async function refreshActiveAgents() {
  const data = await fetchJSON('/api/tasks?status=running');
  apiOnline = data !== null;
  updateSystemStatus();
  activeAgents = Array.isArray(data) ? data : [];

  const strip = document.getElementById('agents-strip');
  const emptyEl = document.getElementById('strip-empty');
  const countEl = document.getElementById('agent-count');

  if (!activeAgents.length) {
    strip.innerHTML = '<div class="strip-empty">无活跃 Agent</div>';
    countEl.textContent = '';
    return;
  }

  countEl.textContent = `${activeAgents.length} running`;

  strip.innerHTML = activeAgents.map(t => {
    const spec = t.spec || {};
    const dept = spec.department || '';
    const action = t.action || spec.action || '未知任务';
    const project = spec.project || t.project || '';
    const mode = spec.cognition_mode || spec.cognitive_mode || '';
    const turns = spec.turns || t.turns || '';
    const startedAt = t.started_at || t.created_at;
    const isSelected = filterTaskId === t.id;

    return `<div class="agent-card${isSelected ? ' selected' : ''}" data-task-id="${t.id}" onclick="toggleFilter(${t.id})">
      <div class="ac-top">
        ${deptBadgeSmall(dept)}
        <span class="ac-action" title="${esc(action)}">${esc(action)}</span>
        <span class="ac-pulse"></span>
      </div>
      <div class="ac-bottom">
        ${project ? `<span class="ac-project">${esc(project)}</span>` : ''}
        ${cmBadge(mode)}
        ${turns ? `<span class="ac-turns">T${turns}</span>` : ''}
        <span class="ac-elapsed" data-started="${startedAt || ''}">${elapsed(startedAt)}</span>
      </div>
    </div>`;
  }).join('');
}

/* ── Elapsed time updater ── */
function updateElapsedTimes() {
  document.querySelectorAll('.ac-elapsed[data-started]').forEach(el => {
    const started = el.dataset.started;
    if (started) el.textContent = elapsed(started);
  });
}

/* ── Filter by task ── */
function toggleFilter(taskId) {
  if (filterTaskId === taskId) {
    filterTaskId = null;
  } else {
    filterTaskId = taskId;
  }
  renderEvents();
  refreshActiveAgents();
}

/* ══════════════════════════════════════
   Event Stream (SSE)
   ══════════════════════════════════════ */
function connectSSE() {
  if (sseSource) {
    sseSource.close();
    sseSource = null;
  }

  sseSource = new EventSource('/api/agent-events-stream');

  sseSource.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);

      if (msg.type === 'backlog' && Array.isArray(msg.events)) {
        for (const evt of msg.events) {
          addEvent(evt);
        }
      } else if (msg.type === 'agent_event' && msg.event) {
        addEvent(msg.event);
      }
    } catch {}
  };

  sseSource.onerror = () => {
    sseSource.close();
    sseSource = null;
    updateSystemStatus();
    setTimeout(connectSSE, 3000);
  };
}

function addEvent(evt) {
  events.push(evt);
  while (events.length > MAX_EVENTS) events.shift();
  renderEvents();
}

/* ── Render events ── */
function renderEvents() {
  const scroll = document.getElementById('events-scroll');
  const emptyEl = document.getElementById('events-empty');
  const countEl = document.getElementById('event-count');
  const filterLabel = document.getElementById('filter-label');
  const clearBtn = document.getElementById('clear-filter');

  const filtered = filterTaskId
    ? events.filter(e => e.task_id === filterTaskId)
    : events;

  if (filterTaskId) {
    filterLabel.textContent = `筛选: Task #${filterTaskId}`;
    filterLabel.style.display = 'inline';
    clearBtn.style.display = 'inline';
  } else {
    filterLabel.style.display = 'none';
    clearBtn.style.display = 'none';
  }

  countEl.textContent = `${filtered.length} events`;

  if (!filtered.length) {
    scroll.innerHTML = '<div class="empty-state" id="events-empty">等待事件...</div>';
    return;
  }

  // Check if user has scrolled up
  const isAtBottom = scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight < 60;

  // Group events and render
  let html = '';
  let lastTaskId = null;

  for (const evt of filtered) {
    if (evt.task_id !== lastTaskId && lastTaskId !== null) {
      html += '<hr class="evt-separator">';
    }
    lastTaskId = evt.task_id;
    html += renderEvent(evt);
  }

  scroll.innerHTML = html;

  // Auto-scroll to bottom
  if (isAtBottom || !userScrolledUp) {
    scroll.scrollTop = scroll.scrollHeight;
  }
}

function renderEvent(evt) {
  const data = evt.data || {};
  const type = evt.event_type || data.type || '';
  const time = evt.created_at ? new Date(evt.created_at).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '';
  const taskLabel = evt.task_id ? `#${evt.task_id}` : '';

  switch (type) {
    case 'agent_turn': return renderTurn(data, time, taskLabel);
    case 'agent_progress': return renderProgress(data, time, taskLabel);
    case 'subtask_started': return renderSubtask(data, time, taskLabel);
    case 'agent_result': return renderResult(data, time, taskLabel);
    default: return renderGeneric(type, data, time, taskLabel);
  }
}

function renderTurn(data, time, taskLabel) {
  const turnNum = data.turn_number || data.turn || '';
  const thinking = data.thinking || '';
  const toolCalls = data.tool_calls || data.tools || [];
  const text = data.text || data.output || '';

  let toolsHtml = '';
  if (Array.isArray(toolCalls) && toolCalls.length) {
    toolsHtml = toolCalls.map(tc => {
      const name = tc.name || tc.tool || 'tool';
      return `<span class="evt-tool-badge">${esc(name)}</span>`;
    }).join(' ');
  } else if (typeof toolCalls === 'string') {
    toolsHtml = `<span class="evt-tool-badge">${esc(toolCalls)}</span>`;
  }

  return `<div class="evt evt-turn">
    <div class="evt-meta">
      ${turnNum ? `<span class="evt-turn-num">Turn ${turnNum}</span>` : ''}
      ${toolsHtml}
      <span class="evt-task-id">${esc(taskLabel)}</span>
      <span class="evt-time">${esc(time)}</span>
    </div>
    ${thinking ? `<div class="evt-thinking" onclick="this.classList.toggle('expanded')">${esc(thinking.substring(0, 300))}${thinking.length > 300 ? '...' : ''}</div>` : ''}
    ${text ? `<div class="evt-text">${esc(text.substring(0, 500))}${text.length > 500 ? '...' : ''}</div>` : ''}
  </div>`;
}

function renderProgress(data, time, taskLabel) {
  const tool = data.tool || data.tool_name || '';
  const desc = data.description || data.message || '';

  return `<div class="evt evt-progress">
    <div class="evt-meta">
      ${tool ? `<span class="evt-tool-badge">${esc(tool)}</span>` : ''}
      <span class="evt-tool-desc">${esc(desc)}</span>
      <span class="evt-task-id">${esc(taskLabel)}</span>
      <span class="evt-time">${esc(time)}</span>
    </div>
  </div>`;
}

function renderSubtask(data, time, taskLabel) {
  const desc = data.description || data.message || 'Sub-agent spawned';

  return `<div class="evt evt-subtask">
    <div class="evt-meta">
      <span class="evt-tool-badge" style="color:var(--indigo);background:#100d1f">subtask</span>
      <span class="evt-task-id">${esc(taskLabel)}</span>
      <span class="evt-time">${esc(time)}</span>
    </div>
    <div class="evt-subtask-desc">${esc(desc)}</div>
  </div>`;
}

function renderResult(data, time, taskLabel) {
  const status = (data.status || 'done').toLowerCase();
  const isErr = status === 'error' || status === 'failed';
  const turns = data.turns || data.num_turns || '';
  const duration = data.duration || data.duration_seconds || data.duration_ms;
  const cost = data.cost || data.total_cost || '';
  const summary = data.summary || data.result || '';

  let durStr = '';
  if (duration) {
    durStr = typeof duration === 'number' && duration > 1000
      ? formatDuration(duration / 1000)
      : formatDuration(duration);
  }

  return `<div class="evt evt-result ${isErr ? 'error' : 'success'}">
    <div class="evt-meta">
      <span class="badge ${isErr ? 'br' : 'bg'}">${isErr ? '失败' : '完成'}</span>
      <span class="evt-task-id">${esc(taskLabel)}</span>
      <span class="evt-time">${esc(time)}</span>
    </div>
    <div class="evt-summary">
      ${turns ? `<span>🔄 ${turns} turns</span>` : ''}
      ${durStr ? `<span>⏱ ${durStr}</span>` : ''}
      ${cost ? `<span>💰 ${formatCost(cost)}</span>` : ''}
    </div>
    ${summary ? `<div class="evt-text" style="margin-top:6px">${esc(String(summary).substring(0, 300))}</div>` : ''}
  </div>`;
}

function renderGeneric(type, data, time, taskLabel) {
  const msg = data.message || data.description || JSON.stringify(data).substring(0, 200);

  return `<div class="evt evt-turn">
    <div class="evt-meta">
      <span class="evt-tool-badge">${esc(type || 'event')}</span>
      <span class="evt-task-id">${esc(taskLabel)}</span>
      <span class="evt-time">${esc(time)}</span>
    </div>
    <div class="evt-text">${esc(msg)}</div>
  </div>`;
}

/* ── Scroll detection ── */
document.getElementById('events-scroll').addEventListener('scroll', function () {
  const el = this;
  userScrolledUp = (el.scrollHeight - el.scrollTop - el.clientHeight) > 60;
});

/* ── Clear filter button ── */
document.getElementById('clear-filter').addEventListener('click', () => {
  filterTaskId = null;
  renderEvents();
  refreshActiveAgents();
});

/* ══════════════════════════════════════
   Scenarios Panel
   ══════════════════════════════════════ */
async function loadScenarios() {
  const data = await fetchJSON('/api/scenarios');
  const list = document.getElementById('scenarios-list');

  if (!data || !Object.keys(data).length) {
    list.innerHTML = '<div class="empty-state">无可用场景</div>';
    return;
  }

  list.innerHTML = Object.entries(data).map(([name, info]) => {
    const depts = (info.departments || []).map(d => deptBadge(d)).join('');
    const displayName = name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

    return `<div class="scenario-card" id="sc-${name}">
      <div class="sc-name">${esc(displayName)}</div>
      <div class="sc-desc">${esc(info.description || '')}</div>
      <div class="sc-depts">${depts}</div>
      <div class="sc-actions">
        <button class="sc-run" onclick="runScenario('${name}', this)">Run</button>
        <span class="sc-status" id="sc-status-${name}"></span>
      </div>
    </div>`;
  }).join('');
}

async function runScenario(name, btn) {
  const statusEl = document.getElementById(`sc-status-${name}`);
  btn.disabled = true;
  statusEl.textContent = '派发中...';
  statusEl.className = 'sc-status dispatching';

  try {
    const r = await fetch(`/api/scenarios/${name}/run`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ project: 'orchestrator' })
    });
    const data = await r.json();

    if (data.error) {
      statusEl.textContent = `错误: ${data.error}`;
      statusEl.className = 'sc-status error';
    } else {
      const count = Array.isArray(data.dispatched) ? data.dispatched.length : 0;
      statusEl.textContent = `已派发 ${count} 任务`;
      statusEl.className = 'sc-status dispatched';
      // Refresh agents after dispatch
      setTimeout(refreshActiveAgents, 2000);
    }
  } catch (e) {
    statusEl.textContent = '派发失败';
    statusEl.className = 'sc-status error';
  }

  btn.disabled = false;
  setTimeout(() => {
    statusEl.textContent = '';
    statusEl.className = 'sc-status';
  }, 8000);
}

/* ══════════════════════════════════════
   Recent Completed
   ══════════════════════════════════════ */
async function loadRecentCompleted() {
  const data = await fetchJSON('/api/tasks?status=done');
  const list = document.getElementById('recent-list');
  const countEl = document.getElementById('done-count');

  const tasks = Array.isArray(data) ? data.slice(0, 10) : [];
  countEl.textContent = tasks.length;

  if (!tasks.length) {
    list.innerHTML = '<div class="empty-state">无最近完成</div>';
    return;
  }

  list.innerHTML = tasks.map(t => {
    const spec = t.spec || {};
    const action = t.action || spec.action || '未知';
    const dept = spec.department || '';
    const dur = t.duration_seconds || spec.duration_seconds || '';
    const icon = taskIcon(t.status);

    return `<div class="recent-item">
      <span class="ri-icon">${icon}</span>
      <span class="ri-action" title="${esc(action)}">${esc(action)}</span>
      ${dept ? `<span class="ri-dept" style="color:${(deptColors[dept] || {}).fg || 'var(--t2)'};background:${(deptColors[dept] || {}).bg || 'var(--inset)'}">${esc(deptNames[dept] || dept)}</span>` : ''}
      <span class="ri-dur">${dur ? formatDuration(dur) : relTime(t.completed_at || t.updated_at)}</span>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════
   System Status
   ══════════════════════════════════════ */
function updateSystemStatus() {
  const pulse = document.getElementById('sys-pulse');
  const label = document.getElementById('sys-status');

  if (apiOnline) {
    pulse.style.background = 'var(--green)';
    label.textContent = '在线';
    label.className = 'tst';
  } else {
    pulse.style.background = 'var(--red)';
    label.textContent = '离线';
    label.className = 'tst off';
  }
}

/* ══════════════════════════════════════
   Init
   ══════════════════════════════════════ */
refreshActiveAgents();
loadScenarios();
loadRecentCompleted();
connectSSE();

// Auto-refresh active agents every 5s
setInterval(refreshActiveAgents, 5000);

// Update elapsed times every second
setInterval(updateElapsedTimes, 1000);

// Refresh recent completed every 30s
setInterval(loadRecentCompleted, 30000);
</script>
