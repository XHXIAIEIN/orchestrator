services:
  orchestrator:
    build: .
    image: orchestrator:latest
    container_name: orchestrator
    restart: "no"
    ports:
      - "23714:23714"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=23714
      # Tell collectors where to find mounted data
      - CHROME_HISTORY_ROOT=/chrome-data
      - ORCHESTRATOR_CLAUDE_HOME=/claude-home
      - CLAUDE_HOME=/claude-home
      - GIT_REPOS_ROOT=/git-repos
      - ORCHESTRATOR_ROOT=/orchestrator
      - STEAM_PATH=/steam-data
      # Terminal appearance
      - TERM=xterm-256color
      - COLORTERM=truecolor
      - LANG=en_US.UTF-8
    volumes:
      # Source code — writable so claude edits persist to host
      - .:/orchestrator
      # node_modules stays in container (don't shadow with host)
      - /orchestrator/dashboard/node_modules
      # Chrome browser history (read-only)
      - type: bind
        source: ${CHROME_USER_DATA:-C:/Users/test/AppData/Local/Google/Chrome/User Data}
        target: /chrome-data
        read_only: true
      # Claude Code conversation history (read-only) — mount entire .claude dir
      - type: bind
        source: ${CLAUDE_HOME_HOST:-C:/Users/test/.claude}
        target: /claude-home
        read_only: true
      # Git repos (read-only, optional)
      - type: bind
        source: ${GIT_ROOT:-C:/Users/test/Documents/GitHub}
        target: /git-repos
        read_only: true
      # Steam data (read-only, optional)
      - type: bind
        source: ${STEAM_PATH_HOST:-D:/Steam}
        target: /steam-data
        read_only: true
