services:
  orchestrator:
    build: .
    image: orchestrator:latest
    container_name: orchestrator
    restart: unless-stopped
    ports:
      - "23714:23714"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=23714
      # Tell collectors where to find mounted data
      - CHROME_HISTORY_ROOT=/chrome-data
      - CLAUDE_PROJECTS_ROOT=/claude-projects
      - GIT_REPOS_ROOT=/git-repos
    volumes:
      # Persist events database on host
      - ./events.db:/orchestrator/events.db
      # Chrome browser history (read-only)
      - type: bind
        source: ${CHROME_USER_DATA:-C:/Users/test/AppData/Local/Google/Chrome/User Data}
        target: /chrome-data
        read_only: true
      # Claude Code conversation history (read-only)
      - type: bind
        source: ${CLAUDE_PROJECTS:-C:/Users/test/.claude/projects}
        target: /claude-projects
        read_only: true
      # Git repos (read-only, optional)
      - type: bind
        source: ${GIT_ROOT:-C:/Users/test/Documents/GitHub}
        target: /git-repos
        read_only: true
