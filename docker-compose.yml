services:
  orchestrator:
    build: .
    image: orchestrator:latest
    container_name: orchestrator
    restart: "no"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT:-23714}:${PORT:-23714}"
    environment:
      - PORT=${PORT:-23714}
      # Tell collectors where to find mounted data
      - CHROME_HISTORY_ROOT=/chrome-data
      - CLAUDE_HOME=/claude-home
      - GIT_REPOS_ROOT=/git-repos
      - ORCHESTRATOR_ROOT=/orchestrator
      - STEAM_PATH=/steam-data
      - QQMUSIC_DATA_PATH=/qqmusic-data
      - VSCODE_DATA_PATH=/vscode-data
      # Terminal appearance
      - TERM=xterm-256color
      - COLORTERM=truecolor
      - LANG=en_US.UTF-8
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - TTS_HOST=${TTS_HOST:-http://host.docker.internal:23715}
      # Channel 层（可选，不设置则静默不启用）
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TELEGRAM_MIN_PRIORITY=${TELEGRAM_MIN_PRIORITY:-HIGH}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - WECOM_WEBHOOK_URL=${WECOM_WEBHOOK_URL:-}
      - CHANNEL_READ_ALLOW_PATHS=${CHANNEL_READ_ALLOW_PATHS:-/orchestrator,/git-repos}
      - CHANNEL_ANIMATION_STYLE=${CHANNEL_ANIMATION_STYLE:-text}
      - CHANNEL_ANIMATION_INTERVAL=${CHANNEL_ANIMATION_INTERVAL:-0.8}
    volumes:
      # Source code — writable so claude edits persist to host
      - .:/orchestrator
      # node_modules stays in container (don't shadow with host)
      - /orchestrator/dashboard/node_modules
      # Chrome browser history (read-only)
      - type: bind
        source: ${CHROME_USER_DATA}
        target: /chrome-data
        read_only: true
      # Claude Code home — writable so Claude CLI can refresh OAuth tokens
      - type: bind
        source: ${CLAUDE_HOME_HOST}
        target: /claude-home
      # Git repos (read-write for cross-project task execution)
      - type: bind
        source: ${GIT_ROOT}
        target: /git-repos
      # Steam data (read-only, optional)
      - type: bind
        source: ${STEAM_PATH_HOST}
        target: /steam-data
        read_only: true
      # QQ Music data (read-only)
      - type: bind
        source: ${QQMUSIC_DATA}
        target: /qqmusic-data
        read_only: true
      # VS Code data (read-only)
      - type: bind
        source: ${VSCODE_DATA}
        target: /vscode-data
        read_only: true
