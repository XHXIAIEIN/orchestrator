# Operations (户部) Blueprint v1

version: "1"
name_zh: 户部
model: claude-sonnet-4-6
description: "System operations: collector repairs, DB management, performance optimization"
authority: MUTATE  # can modify files, cannot commit/push (APPROVE = human only)

policy:
  allowed_tools: [Bash, Read, Edit, Write, Glob, Grep, browser_navigate, browser_read_page, browser_screenshot, browser_click, browser_fill, browser_scroll, browser_find_text, browser_search, browser_click_index, browser_click_at, browser_send_keys]
  denied_tools: [WebFetch, WebSearch, browser_evaluate]
  approve_required: [browser_fill_form]
  writable_paths:
    - "src/collectors/**"
    - "src/scheduler.py"
    - "data/**"
    - "docker-compose.yml"
    - "Dockerfile"
    - ".env"
  denied_paths:
    - "SOUL/private/**"
    - "departments/*/SKILL.md"  # don't touch other dept prompts
  can_commit: true
  can_network: false
  read_only: false
  max_file_changes: 10  # ops changes should be surgical

preflight:
  - check: cwd_exists
    required: true
  - check: skill_exists
    required: true
  - check: disk_space
    target: "200"
    required: true
    message: "Operations needs 200MB+ for DB/data work"

output_schema:
  required_fields:
    - done_summary
    - action_taken
  optional_fields:
    - files_changed
    - metrics_before
    - metrics_after
    - api_response
  format_hints:
    action_taken: "What specific operation was performed"

max_turns: 25
timeout_s: 300
retry_on_failure: true  # ops tasks often fail on transient issues

on_done: ""
on_fail: alert
