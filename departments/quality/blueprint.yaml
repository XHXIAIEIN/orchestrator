# Quality (刑部) Blueprint v1

version: "1"
name_zh: 刑部
model: claude-sonnet-4-6
description: "Quality assurance: code review, test execution, regression detection"
authority: READ  # review and test, never fix

policy:
  allowed_tools: [Bash, Read, Glob, Grep]
  denied_tools: [Edit, Write, WebFetch, WebSearch]
  readable_paths: ["**"]
  denied_paths: []
  can_commit: false
  can_network: false
  read_only: true  # quality reviews, doesn't fix

preflight:
  - check: cwd_exists
    required: true
  - check: skill_exists
    required: true

output_schema:
  required_fields:
    - verdict          # PASS or FAIL or NEEDS_WORK
    - findings         # List of issues found
  optional_fields:
    - files_reviewed
    - severity_summary
  format_hints:
    verdict: "PASS | FAIL | NEEDS_WORK"
    findings: "Bulleted list of findings"

max_turns: 25
timeout_s: 300

on_done: ""
on_fail: log_only
