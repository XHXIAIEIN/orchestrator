# Engineering (工部) Blueprint v1
# Machine-readable config — Governor reads this.
# SKILL.md remains the LLM prompt — Agent reads that.

version: "1"
name_zh: 工部
model: claude-sonnet-4-6
description: "Code engineering: writes code, fixes bugs, refactors, optimizes"
authority: MUTATE  # can modify files, cannot commit/push (APPROVE = human only)

policy:
  allowed_tools: [Bash, Read, Edit, Write, Glob, Grep, browser_navigate, browser_read_page, browser_summarize_page, browser_screenshot, browser_snapshot, browser_scroll, browser_find_text, browser_search, browser_click_index, browser_send_keys]
  denied_tools: [WebFetch, WebSearch, browser_evaluate, browser_fill_form, browser_click_at]
  writable_paths:
    - "src/**"
    - "departments/**"
    - "dashboard/**"
    - "tests/**"
    - "SOUL/**"
    - "scripts/**"
  denied_paths:
    - ".env"
    - "*.key"
    - "*.pem"
    - "credentials.*"
    - "data/events.db"  # schema changes need Operations
  can_commit: true
  can_network: false
  read_only: false

preflight:
  - check: cwd_exists
    required: true
  - check: skill_exists
    required: true
  - check: disk_space
    target: "100"
    required: false
    message: "Need at least 100MB free for code changes"

output_schema:
  required_fields:
    - done_summary     # 一句话总结做了什么
    - files_changed    # 改了哪些文件
  optional_fields:
    - commit_hash
    - remaining_work
    - test_results
  format_hints:
    done_summary: "One-line summary of what was accomplished"
    files_changed: "Comma-separated list of file paths"

max_turns: 25
timeout_s: 300
retry_on_failure: false

# After engineering completes, auto-dispatch quality review
on_done: quality_review
on_fail: log_only
