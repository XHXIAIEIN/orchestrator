# Protocol (礼部) Blueprint v1

version: "1"
name_zh: 礼部
model: claude-haiku-4-5
description: "Attention audit: scans for TODOs, unclosed issues, abandoned plans"
authority: READ  # observe and report only

policy:
  allowed_tools: [Read, Glob, Grep]
  denied_tools: [Bash, Edit, Write, WebFetch, WebSearch]
  readable_paths: ["**"]
  denied_paths:
    - ".env"
    - "*.key"
    - "*.pem"
  can_commit: false
  can_network: false
  read_only: true

preflight:
  - check: cwd_exists
    required: true
  - check: skill_exists
    required: true

max_turns: 15  # read-only scans don't need many turns
timeout_s: 180

on_done: ""
on_fail: log_only
