# Protocol (礼部) — Manifest v2

# ── Identity ──
key: protocol
name_zh: 礼部
description: "Attention audit: TODO scanning, unclosed issues, abandoned plan detection"
prompt_prefix: "You are Protocol (礼部) of Orchestrator — the attention audit department."
skill_path: departments/protocol/SKILL.md

# ── Intent Routing ──
tags:
  - audit
  - attention
  - todo
  - debt
  - scan
  - review
  - abandoned
  - stale

# ── Dimension Mapping (偷自 Clawvard skill-dimension 模式) ──
dimensions:
  primary: attention
  secondary: [quality]
  boost: "+6"

intents:
  audit_attention:
    description: "注意力审计、TODO 扫描"
    profile: LOW_LATENCY
    default: true
  audit_debt:
    description: "技术债扫描"
    profile: LOW_LATENCY

# ── Execution ──
model: claude-haiku-4-5
authority: READ
max_turns: 15
timeout_s: 180
retry_on_failure: false
on_done: ""
on_fail: log_only

# ── Policy ──
policy:
  allowed_tools: [Read, Glob, Grep]
  denied_tools: [Bash, Edit, Write, WebFetch, WebSearch]
  readable_paths: ["**"]
  denied_paths:
    - ".env"
    - "*.key"
    - "*.pem"
  can_commit: false
  can_network: false
  read_only: true

# ── Preflight ──
preflight:
  - check: cwd_exists
    required: true
  - check: skill_exists
    required: true

# ── Blast Radius (偷自 evolver GEP constraint) ──
blast_radius:
  max_files_per_run: 5
  forbidden_paths: [".env", "*.key", "*.pem", "data/events.db", "SOUL/private/identity.md"]

# ── Divisions (二十四司) ──
divisions:
  interpret:
    name_zh: 解读
    description: "Spec/requirement parsing, implicit need detection"
    exam_dimension: understanding
  calibrate:
    name_zh: 校准
    description: "SOUL maintenance, voice calibration, persona"
  communicate:
    name_zh: 沟通
    description: "External interaction, tone management, diplomacy"
    exam_dimension: eq
  polish:
    name_zh: 润色
    description: "Content quality, formatting standards"
