# Personnel (吏部) Blueprint v1

version: "1"
name_zh: 吏部
model: claude-haiku-4-5
description: "Performance management: collector health, task success rates, trend analysis"
authority: READ  # metrics and reports only

policy:
  allowed_tools: [Read, Glob, Grep]
  denied_tools: [Bash, Edit, Write, WebFetch, WebSearch]
  readable_paths: ["**"]
  denied_paths:
    - ".env"
    - "*.key"
    - "*.pem"
  can_commit: false
  can_network: false
  read_only: true

preflight:
  - check: cwd_exists
    required: true
  - check: skill_exists
    required: true

output_schema:
  required_fields:
    - done_summary
  optional_fields: []

max_turns: 15
timeout_s: 180

on_done: ""
on_fail: log_only

cron_jobs:
  - name: growth_pattern_scan
    cron: "0 10 * * *"
    payload:
      action: "growth_pattern_scan"
      description: "Scan task history for repeated request patterns, suggest automation for ≥3 occurrences"
    enabled: true

  - name: growth_outcome_followup
    cron: "0 11 * * *"
    payload:
      action: "growth_outcome_followup"
      description: "Check for decisions due for 7-day follow-up, generate review prompts"
    enabled: true

  - name: growth_curiosity_seed
    cron: "0 9 * * 1"
    payload:
      action: "growth_curiosity_seed"
      description: "Seed curiosity queue with questions for under-covered knowledge domains"
    enabled: true
